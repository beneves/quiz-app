R3(config-if)#ip ospf priority 200"
  correct_answer: [A, C]
  explanation: "Setting R3's interface priority to 0 makes it ineligible for DR or BDR, and raising R1's interface priority above the others causes R1 to win the DR election on the broadcast segment."
