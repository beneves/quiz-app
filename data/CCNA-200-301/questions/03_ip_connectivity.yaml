    D: "ip route 10.73.65.66 0.0.0.224 10.80.65.0 255"
  correct_answer: C
  explanation: "A floating static route must use the correct /29 mask and an administrative distance higher than the external EIGRP default administrative distance of 170. Setting the AD to 171 makes the static route a backup."
