  question: "Refer to the exhibit. The network engineer is configuring router R2 as a replacement router on the network. After the initial configuration is applied, R2 fails to show R1 as a neighbor. Which configuration must be applied to R2 to establish the OSPF neighbor relationship with R1?"
  exhibit: |
