    - shared link 10.73.65.64/30
    - existing LAN 10.80.65.0/29 with PC10
    - new network installed: 10.120.10.0/24 on R14 side

    Requirement:
    - advertise 10.120.10.0/24 into OSPF process 100, Area 0
  options:
    A: "router ospf 100
 network 10.120.10.0 0.0.0.255 area 0"
    B: "router ospf 120
 network 10.120.10.0 255.255.255.0 area 0
 ip route 10.120.10.0 255.255.255.0 fa0/1"
    C: "router ospf 100 area 0
 network 10.120.10.0 0.0.0.255"
    D: "router ospf 100
 network 10.120.10.0 255.255.255.0 area 0"
