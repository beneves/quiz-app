- id: IC-029
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: hard
  tags: [ospf, adjacency, dr-election, router-id, priority]
  question: "Refer to the exhibit. All interfaces are configured with duplex auto and `ip ospf network broadcast`. Which configuration allows routers R14 and R86 to form an OSPFv2 adjacency and makes one router act as the central point for exchanging OSPF information between routers?"
  exhibit: |
    Topology:
    - R14 Loopback0 = 10.10.1.14/32
    - R14 FastEthernet0/0 = 10.73.65.65/30
    - R86 FastEthernet0/0 = 10.73.65.66/30
    - R86 Loopback0 = 10.10.1.86/32

    Key requirements from the correct option:
    - OSPF enabled on both loopbacks in Area 0
    - OSPF enabled on both FastEthernet0/0 links in Area 0
    - Explicit router IDs configured: 10.10.1.14 and 10.10.1.86
    - `ip ospf priority 255` applied on R14 FastEthernet0/0
    - Shared link uses broadcast network type so one router becomes DR
  options:
    A: "Configure both FastEthernet0/0 interfaces in Area 0, assign router IDs, and set `ip ospf priority 255` only on R14."
    B: "Enable OSPF on both loopbacks and FastEthernet0/0 interfaces, but set the OSPF priority under `router ospf 10`."
    C: "Configure the FastEthernet0/0 interfaces and router IDs on both routers, but do not enable OSPF on the loopbacks."
    D: "Enable OSPF on both loopbacks and FastEthernet0/0 interfaces in Area 0, assign router IDs, and set `ip ospf priority 255` on R14 FastEthernet0/0."
  correct_answer: D
  explanation: "With OSPF broadcast network type, the central point for exchanging LSAs is the DR. The correct configuration must place the shared link in OSPF Area 0 on both routers and set a high interface priority on R14 so it wins the DR election. The shown correct option also includes the loopbacks in OSPF."
  source: 3-IP-Connectivity_151/IC-029.png


