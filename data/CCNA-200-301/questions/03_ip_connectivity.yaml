- id: IC-007
  topic: IP Connectivity
  subtopic: "Routing"
  type: single_choice
  difficulty: easy
  tags: [longest-prefix-match, route-selection, administrative-distance]
  question: "Refer to the exhibit. Router R1 is running three different routing protocols. Which route characteristic is used by the router to forward the packet that it receives for destination IP 172.16.32.1?"
  exhibit: |
    R1# show ip route
    D 172.16.32.0/27 [90/2888597172] via 20.1.1.1
    O 172.16.32.0/19 [110/292094]    via 20.1.1.10
    R 172.16.32.0/24 [120/2]         via 20.1.1.3
  options:
    A: "longest prefix"
    B: "administrative distance"
    C: "cost"
    D: "metric"
  correct_answer: A
  explanation: "Routers first choose the most specific matching route. Longest-prefix match is considered before administrative distance or metric."
  source: 3-IP-Connectivity_151/IC-007.png


- id: IC-008
  topic: IP Connectivity
  subtopic: "Static Routing"
  type: single_choice
  difficulty: medium
  tags: [floating-static-route, rip, administrative-distance]
  question: "Refer to the exhibit. Routers R1 and R2 are configured with RIP as the dynamic routing protocol. A network engineer must configure R1 with a floating static route to serve as a backup route to network 192.168.23. Which command must the engineer configure on R1?"
  exhibit: |
    Topology:
    - R1 <-> R2 on 192.168.12.0/24
    - R1 <-> R3 on 192.168.13.0/24
    - R2 <-> R3 on 192.168.23.0/24
    - RIP runs between R1 and R2

    Goal:
    - Create a backup static route on R1 toward 192.168.23.0/24
    - Primary route remains the RIP-learned path
  options:
    A: "ip route 192.168.23.0 255.255.255.0 192.168.13.3 100"
    B: "ip route 192.168.23.0 255.255.255.255 192.168.13.3 121"
    C: "ip route 192.168.23.0 255.255.255.0 192.168.13.3 121"
    D: "ip route 192.168.23.0 255.255.255.0 192.168.13.3"
  correct_answer: C
  explanation: "A floating static route must use the correct network and mask, and its administrative distance must be higher than RIP's 120, so 121 makes it a backup path."
  source: 3-IP-Connectivity_151/IC-008.png


- id: IC-009
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: medium
  tags: [ospf, dr, bdr, priority]
  question: "Refer to the exhibit. R1 has taken the DROTHER role in the OSPF DR/BDR election process. Which configuration must an engineer implement so that R1 is elected as the DR?"
  exhibit: |
    Broadcast segment 10.10.10.0/24 in OSPF Area 0:
    - R1 Fa0/0 = 10.10.10.1
    - R2 Fa0/2 = 10.10.10.2
    - R3 Fa0/1 = 10.10.10.3

    R1# show ip ospf neighbor
    Neighbor ID 10.10.10.2  Pri 1  State FULL/BDR
    Neighbor ID 10.10.10.3  Pri 1  State FULL/DR
  options:
    A: "R1(config)#interface FastEthernet 0/0
R1(config-if)#ip ospf priority 1
R1#clear ip ospf process"
    B: "R3(config)#interface FastEthernet 0/1
R3(config-if)#ip ospf priority 200
R3#clear ip ospf process"
    C: "R2(config)#interface FastEthernet 0/2
R2(config-if)#ip ospf priority 1
R2#clear ip ospf process"
    D: "R1(config)#interface FastEthernet 0/0
R1(config-if)#ip ospf priority 200
R1#clear ip ospf process"
  correct_answer: D
  explanation: "On a broadcast network, increasing R1's OSPF interface priority above the others and restarting the OSPF process forces a new election in which R1 becomes DR."
  source: 3-IP-Connectivity_151/IC-009.png


- id: IC-010
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: easy
  tags: [ospf, router-id, loopback]
  question: "What is the effect when loopback interfaces and the configured router ID are absent during the OSPF process configuration?"
  options:
    A: "The lowest IP address is incremented by 1 and selected as the router ID."
    B: "The router ID 0.0.0.0 is selected and placed in the OSPF process."
    C: "No router ID is set, and the OSPF protocol does not run."
    D: "The highest up/up physical interface IP address is selected as the router ID."
  correct_answer: D
  explanation: "If no manual router ID is configured and no loopback exists, OSPF chooses the highest IP address on an active physical interface."
  source: adapted_from_images

- id: IC-011
  topic: IP Connectivity
  subtopic: "Routing"
  type: single_choice
  difficulty: medium
  tags: [longest-prefix-match, route-selection, rip]
  question: "Refer to the exhibit. How does router R1 handle traffic to 192.168.10.16?"
  exhibit: |
    R1# show ip route
    D    192.168.10.0/24 [90/2679326] via 192.168.1.1
    R    192.168.10.0/27 [120/3]      via 192.168.1.2
    O    192.168.10.0/23 [110/2]      via 192.168.1.3
    i L1 192.168.10.0/13 [115/30]     via 192.168.1.4
