    - keep R3 as primary
    - use R2 only as backup if R3 fails
    - do not change the primary route administrative distance
  options:
    A: "ip route 0.0.0.0 0.0.0.0 209.165.201.5 10"
    B: "ip route 0.0.0.0 0.0.0.0 g0/1 1"
