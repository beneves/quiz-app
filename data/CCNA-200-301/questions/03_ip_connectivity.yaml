- id: IC-141
  topic: IP Connectivity
  subtopic: "Transport Protocols"
  type: single_choice
  difficulty: easy
  tags: [tcp, udp, transport]
  question: "What differentiates the TCP and UDP protocols?"
  options:
    A: "TCP sends data at a constant rate with error checking on upper protocol layers, and UDP provides error-checking and sequencing."
    B: "TCP establishes a connection with the device on the other end before transferring, and UDP transfers without establishing a connection."
    C: "TCP immediately transmits data without waiting for a handshake, and UDP awaits a response from the receiver before sending additional data."
    D: "TCP tracks segments being transmitted or received by assigning segment numbers, and UDP adjusts data flow according to network conditions."
  correct_answer: B
  explanation: "TCP is connection-oriented and uses a handshake before data transfer. UDP is connectionless and sends data without first establishing a session."
  source: adapted_from_images

