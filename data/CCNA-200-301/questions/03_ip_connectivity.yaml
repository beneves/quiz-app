  correct_answer: B
  explanation: "The WAN link uses subnet 10.0.0.32/27, so R2 must use address 10.0.0.34 with mask 255.255.255.224. To make R2 win the DR election against R1, which has OSPF priority 99, R2 needs a higher OSPF priority such as 100."
