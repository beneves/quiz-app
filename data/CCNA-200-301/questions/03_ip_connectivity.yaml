    - 192.168.1.224/27

    Task:
    - apply longest-prefix match to choose the forwarding entry
  options:
    A: "192.168.1.0/24 via 192.168.12.2"
    B: "192.168.1.128/25 via 192.168.13.3"
    C: "192.168.1.192/26 via 192.168.14.4"
    D: "192.168.1.224/27 via 192.168.15.5"
  correct_answer: D
  explanation: "The destination 192.168.1.250 falls within 192.168.1.224/27. Because that is the most specific matching route, the router forwards the packet via 192.168.15.5."
  source: 3-IP-Connectivity_151/IC-137.png

