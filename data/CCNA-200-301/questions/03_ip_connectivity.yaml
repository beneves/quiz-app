- id: IC-045
  topic: IP Connectivity
  subtopic: "Routing"
  type: single_choice
  difficulty: medium
  tags: [routing-table, longest-prefix-match, show-ip-route]
  question: "A router received three destination prefixes: 10.0.0.0/8, 10.0.0.0/16, and 10.0.0.0/24. When the `show ip route` command is executed, which output does it return?"
  options:
    A: "Gateway of last resort is 172.16.1.1 to network 0.0.0.0\nO E2 10.0.0.0/8 [110/5] via 192.168.1.1, 0:01:00, Ethernet0\nO E2 10.0.0.0/16 [110/5] via 192.168.2.1, 0:01:00, Ethernet1\nO E2 10.0.0.0/24 [110/5] via 192.168.3.1, 0:01:00, Ethernet2"
    B: "Gateway of last resort is 172.16.1.1 to network 0.0.0.0\nO E2 10.0.0.0/8 [110/5] via 192.168.1.1, 0:01:00, Ethernet0"
    C: "Gateway of last resort is 172.16.1.1 to network 0.0.0.0\nO E2 10.0.0.0/24 [110/5] via 192.168.3.1, 0:01:00, Ethernet2"
    D: "Gateway of last resort is 172.16.1.1 to network 0.0.0.0\nO E2 10.0.0.0/16 [110/5] via 192.168.2.1, 0:01:00, Ethernet1\nO E2 10.0.0.0/24 [110/5] via 192.168.3.1, 0:01:00, Ethernet2"
  correct_answer: A
  explanation: "The routing table can contain all three routes simultaneously because they are distinct prefixes. Longest-prefix match is used during forwarding, but `show ip route` still displays each learned route."
