- id: IC-012
  topic: IP Connectivity
  subtopic: "Routing"
  type: multiple_choice
  difficulty: medium
  tags: [route-selection, administrative-distance, metric, ospf, static]
  question: "Refer to the exhibit. Which two values does router R1 use to identify valid routes for the R3 loopback address 1.1.1.3/32? (Choose two.)"
  exhibit: |
    Topology:
    - R1 loopback 1.1.1.1
    - R2 loopback 1.1.1.2
    - R3 loopback 1.1.1.3
    - R4 loopback 1.1.1.4
    - OSPF Area 0 on top links
    - OSPF Area 1 on bottom links

    R1# show ip route
    O IA 1.1.1.0/24 [110/31] via 12.1.1.2
    C    24.1.1.0/30 is directly connected
    C    34.1.1.0/30 is directly connected
    S    1.1.1.3/32 [1/0] via 14.1.1.2
  options:
    A: "lowest cost to reach the next hop"
    B: "highest administrative distance"
    C: "lowest metric"
    D: "highest metric"
    E: "lowest administrative distance"
  correct_answer: [C, E]
  explanation: "When multiple matching routes exist, the router prefers the one with the lowest administrative distance; if those are equal, it chooses the route with the lowest metric."
