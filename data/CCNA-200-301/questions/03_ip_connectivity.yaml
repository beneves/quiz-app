- id: IC-059
  topic: IP Connectivity
  subtopic: "Routing"
  type: single_choice
  difficulty: medium
  tags: [longest-prefix-match, route-selection, routing-table]
  question: "Refer to the exhibit. How will the device handle a packet destined to IP address 100.100.100.100?"
  exhibit: |
    100.0.0.0/8 is variably subnetted, 4 subnets, 4 masks
    R 100.0.0.0/8         [120/2]    via 192.168.3.1, Ethernet0/3
    S 100.100.0.0/16      [1/0]      via 192.168.4.1
    D 100.100.100.0/24    [90/435200] via 192.168.2.1, Ethernet0/2
    O 100.100.100.100/32  [110/21]   via 192.168.1.1, Ethernet0/1
  options:
    A: "It will always prefer dynamic routes and choose the route `S 100.100.0.0/16 [1/0] via 192.168.4.1`."
