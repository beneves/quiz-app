- id: IC-088
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: medium
  tags: [ospf, area-mismatch, neighbor-adjacency, troubleshooting]
  question: "Refer to the exhibit. Which configuration issue is preventing the OSPF neighbor relationship from being established between router R1 and router R2?"
  exhibit: |
    OSPF configuration comparison:
    - R1 and R2 share a directly connected link
    - the interfaces are placed into different OSPF areas in the exhibit

    Symptom:
    - the routers do not become OSPF neighbors
  options:
    A: "The interfaces are in different OSPF areas."
    B: "The router IDs are duplicated."
    C: "R2 is configured as passive on the transit interface."
    D: "The hello interval is mismatched."
  correct_answer: A
  explanation: "Routers must place the common link in the same OSPF area to form adjacency. An area mismatch prevents the OSPF neighbor relationship from being established."
