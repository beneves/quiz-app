- id: IC-067
  topic: IP Connectivity
  subtopic: "First Hop Redundancy"
  type: single_choice
  difficulty: easy
  tags: [fhrp, availability, failover]
  question: "What is the primary purpose of the first hop redundancy protocols?"
  options:
    A: "to ensure high availability of the network by providing a secondary route on the RIB at the active gateway"
    B: "to ensure high availability of the network by providing a redundant path via ARP in case of a failure or path failure"
    C: "to ensure high availability of the network by providing a backup route on the CEF in case of a gateway failure"
    D: "to ensure high availability of the network by providing a transparent fail-over at the active gateway"
  correct_answer: D
