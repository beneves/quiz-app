  question: "Refer to the exhibit. What does the router do when a packet destined for 10.10.1.1 arrives and no specific route exists for that destination?"
  exhibit: |
    Routing table summary:
    - no specific route exists for destination 10.10.1.1
    - a gateway of last resort is present in the exhibit

    Task:
    - determine how the router forwards unmatched traffic
  options:
    A: "It discards the packet immediately."
    B: "It forwards the packet using the default route."
    C: "It sends an ICMP redirect to the source."
    D: "It floods the packet out all interfaces."
  correct_answer: B
  explanation: "When no more specific route exists but a gateway of last resort is configured, the router forwards the packet using the default route."
  source: 3-IP-Connectivity_151/IC-089.png

- id: IC-090
  topic: IP Connectivity
  subtopic: "Static Routing"
  type: single_choice
  difficulty: medium
  tags: [floating-static-route, eigrp, administrative-distance]
  question: "Refer to the exhibit. An engineer must configure a floating static route on an external EIGRP network. The destination subnet is the /29 on the LAN interface of R86. Which command must be executed on R14?"
  exhibit: |
