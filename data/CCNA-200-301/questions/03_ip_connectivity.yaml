  question: "Refer to the exhibit. All routers in the network are configured. R2 must be the DR. After the engineer connected the devices, R1 was elected as the DR. Which command sequence must be configured on R2 to be elected as the DR in the network?"
  exhibit: |
    Broadcast network with OSPF process 1:
    - R1 RID 192.168.2.8, currently DR
    - R2 RID 192.168.2.1, must become DR
    - R3 RID 192.168.2.6, currently BDR
    - R4 RID 192.168.2.4

    Requirement:
    - force R2 to win DR election on its shared interface
  options:
    A: "R2(config)#interface gi0/0
R2(config-if)#ip ospf priority 100"
    B: "R2(config)#router ospf 1
R2(config-router)#router-id 192.168.2.7"
    C: "R2(config)#router ospf 1
R2(config-router)#router-id 10.100.100.100"
    D: "R2(config)#interface gi0/0
R2(config-if)#ip ospf priority 1"
  correct_answer: A
  explanation: "On broadcast networks, OSPF elects the DR based on interface priority first. Increasing R2's OSPF priority on the shared interface makes it win the election."
