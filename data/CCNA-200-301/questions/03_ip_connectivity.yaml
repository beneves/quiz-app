- id: IC-150
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: medium
  tags: [ospf, hello-timer, dead-timer, neighbor]
  question: "Refer to the exhibit. The network engineer is configuring router R2 as a replacement router on the network. After the initial configuration is applied, it is determined that R2 failed to show R1 as a neighbor. Which configuration must be applied to R2 to complete the OSPF configuration and enable it to establish the neighbor relationship with R1?"
  exhibit: |
    OSPF timer mismatch clue:
    - R1 and R2 share a common network
    - R1 is using dead interval 40
    - R2 is using a different dead interval

    Task:
    - make the interface timers match so adjacency can form
  options:
    A: "`R2(config)#router ospf 1` then `R2(config-router)#network 192.168.1.0 255.255.255.0 area 2`"
    B: "`R2(config)#interface g0/0` then `R2(config-if)#ip ospf hello-interval 10`"
    C: "`R2(config)#interface g0/0` then `R2(config-if)#ip ospf dead-interval 40`"
    D: "`R2(config)#router ospf 1` then `R2(config-router)#router-id 192.168.1.2`"
  correct_answer: C
  explanation: "OSPF neighbors must agree on key interface parameters, including hello and dead timers. R1 is using a dead interval of 40 seconds, while R2 is using a different value, so R2 must be changed to `ip ospf dead-interval 40` on the interface."
  source: 3-IP-Connectivity_151/IC-150.png

- id: IC-151
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: easy
  tags: [ospf, network-type, adjacency, point-to-point]
  question: "A Cisco engineer notices that two OSPF neighbors are connected using a crossover Ethernet cable. The neighbors are taking too long to become fully adjacent. Which command must be issued under the interface configuration on each router to reduce the time required for the adjacency to reach the FULL state?"
  options:
    A: "`ip ospf dead-interval 40`"
    B: "`ip ospf network broadcast`"
    C: "`ip ospf priority 0`"
    D: "`ip ospf network point-to-point`"
  correct_answer: D
  explanation: "Configuring the Ethernet link as OSPF point-to-point removes DR/BDR election on that segment, which speeds up the adjacency process between the two directly connected routers."
  source: adapted_from_images
