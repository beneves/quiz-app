- id: IC-001
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: medium
  tags: [ospf, hello-timer, neighbors, adjacency]
  question: "Refer to the exhibit. Which action establishes the OSPF neighbor relationship without forming an adjacency?"
  exhibit: |
    R1# sh ip ospf int gi0/0
    - Area 1, network type BROADCAST
    - Internet Address 10.201.24.8/28
    - Router ID 192.168.1.1
    - State DR, Priority 1
    - Timer intervals: Hello 10, Dead 40, Wait 40, Retransmit 5

    R2# sh ip ospf int gi0/0
    - Area 1, network type BROADCAST
    - Internet Address 10.201.24.1/28
    - Router ID 172.16.1.1
    - State DR, Priority 1
    - Timer intervals: Hello 20, Dead 80, Wait 80, Retransmit 5
  options:
    A: "modify hello interval"
    B: "modify process ID"
    C: "modify priority"
    D: "modify network type"
  correct_answer: A
  explanation: "OSPF neighbors must have matching hello and dead timers. The exhibit shows mismatched hello timers, preventing a normal neighbor relationship."
  source: 3-IP-Connectivity_151/IC-001.png


- id: IC-002
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: easy
  tags: [ospf, metric, cost, bandwidth]
  question: "When OSPF learns multiple paths to a network, how does it select a route?"
  options:
    A: "For each existing interface, it adds the metric from the source router to the destination to calculate the route with the lowest bandwidth."
    B: "It counts the number of hops between the source router and the destination to determine the route with the lowest metric."
    C: "It divides a reference bandwidth of 100 Mbps by the actual bandwidth of the exiting interface to calculate the route with the lowest cost."
    D: "It multiplies the active K values by 256 to calculate the route with the lowest metric."
  correct_answer: C
  explanation: "OSPF uses cost, based by default on reference bandwidth divided by interface bandwidth, and prefers the path with the lowest total cost."
  source: adapted_from_images

- id: IC-003
  topic: IP Connectivity
  subtopic: "Routing"
  type: single_choice
  difficulty: easy
  tags: [administrative-distance, static-route, default-route]
  question: "Refer to the exhibit. What is the value of the administrative distance for the default gateway?"
  exhibit: |
    Router# show ip route
    Gateway of last resort is 172.17.0.2 to network 0.0.0.0

    S* 0.0.0.0/0 [1/0] via 172.17.0.2
    O E2 10.2.0.0/16 [110/10] via 10.2.24.1
    O    10.2.17.0/24 [110/6] via 10.2.24.1
    O    10.2.23.0/24 [110/6] via 10.2.24.1
    C    10.173.5.0/24 is directly connected, Vlan283
    L    10.173.5.2/32 is directly connected, Vlan283
  options:
    A: "110"
    B: "10"
    C: "1"
    D: "0"
  correct_answer: C
  explanation: "The default route entry is marked with [1/0], where 1 is the administrative distance and 0 is the metric."
  source: 3-IP-Connectivity_151/IC-003.png


- id: IC-004
  topic: IP Connectivity
  subtopic: "First Hop Redundancy"
  type: single_choice
  difficulty: easy
  tags: [fhrp, availability, gateway-redundancy]
  question: "What is the benefit of using FHRP?"
  options:
    A: "reduced ARP traffic on the network"
    B: "balancing traffic across multiple gateways in proportion to their loads"
    C: "higher degree of availability"
    D: "reduced management overhead on network routers"
  correct_answer: C
  explanation: "First Hop Redundancy Protocols are used to provide redundant default gateway service and increase availability."
  source: adapted_from_images

- id: IC-005
  topic: IP Connectivity
  subtopic: "Routing"
  type: single_choice
  difficulty: medium
  tags: [longest-prefix-match, routing-table, next-hop]
  question: "Refer to the exhibit. Which next-hop IP address does Router1 use for packets destined to host 10.10.13.158?"
  exhibit: |
    Topology from Router1:
    - Router2 via 10.10.10.0/30
    - Router3 via 10.10.10.4/30
    - Router4 via 10.10.10.8/30
    - Router5 via 10.10.10.12/30
    - Internet via 10.10.11.0/30
    - MPLS via 10.10.12.0/30

    Router1# show ip route
    B 209.165.200.224/27 via 10.10.12.2
    B 209.165.201.0/27   via 10.10.12.2
    B 209.165.202.128/25 via 10.10.12.2
    O 10.10.13.0/25      via 10.10.10.1
    O 10.10.13.128/28    via 10.10.10.5
    O 10.10.13.144/28    via 10.10.10.9
    O 10.10.13.160/29    via 10.10.10.5
    O 10.10.13.208/29    via 10.10.10.13
    S* 0.0.0.0/0         via 10.10.11.2
  options:
    A: "10.10.10.9"
    B: "10.10.10.5"
    C: "10.10.11.2"
    D: "10.10.12.2"
  correct_answer: A
  explanation: "The destination 10.10.13.158 matches the most specific route 10.10.13.144/28, which uses next hop 10.10.10.9."
  source: 3-IP-Connectivity_151/IC-005.png


