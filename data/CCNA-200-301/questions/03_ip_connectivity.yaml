- id: IC-072
  topic: IP Connectivity
  subtopic: "OSPF"
  type: multiple_choice
  difficulty: medium
  tags: [ospf, dr-election, priority, bdr]
  question: "Refer to the exhibit. Which two configurations must the engineer apply on this network so that R1 becomes the DR? (Choose two.)"
  exhibit: |
    Broadcast segment 192.168.100.0/24, OSPF Area 0:
    - R1 = 192.168.100.1
    - R2 = 192.168.100.2
    - R3 = 192.168.100.3

    R1# show ip ospf neighbor
    Neighbor 192.168.100.2  Pri 1  State FULL/BDR  Addr 192.168.100.2  Fa0/0
    Neighbor 192.168.100.3  Pri 1  State FULL/DR   Addr 192.168.100.3  Fa0/0

    Goal:
    - make R1 become DR on this segment
  options:
    A: "R3(config)#interface fastethernet 0/0
R3(config-if)#ip ospf priority 0"
    B: "R1(config)#router ospf 1
R1(config-router)#router-id 192.168.100.1"
    C: "R1(config)#interface fastethernet 0/0
R1(config-if)#ip ospf priority 200"
    D: "R2(config)#interface fastethernet 0/0
