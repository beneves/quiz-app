- id: IC-017
  topic: IP Connectivity
  subtopic: "Transport Layer"
  type: equivalence_buttons
  difficulty: easy
  tags: [tcp, udp, drag-and-drop, transport-layer]
  question: "Match the TCP and UDP characteristics to the correct protocol. Not all options are used."
  premises:
    - "uses sequence numbers"
    - "supports real-time applications"
    - "relies on acknowledgment packets"
    - "operates on OSI Layer 5"
    - "connectionless at transport layer"
    - "minimal error checking"
    - "ensures data integrity"
  responses:
    - "TCP"
    - "UDP"
  correct_matches:
    "uses sequence numbers": "TCP"
    "relies on acknowledgment packets": "TCP"
    "ensures data integrity": "TCP"
    "supports real-time applications": "UDP"
    "connectionless at transport layer": "UDP"
    "minimal error checking": "UDP"
  explanation: "TCP is connection-oriented and uses sequencing and acknowledgments for reliable delivery. UDP is connectionless and commonly used by delay-sensitive real-time applications."
  source: adapted_from_images

