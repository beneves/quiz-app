- id: IC-146
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: medium
  tags: [ospf, dr, priority, subnetting]
  question: "Refer to the exhibit. An engineer must configure router R2 so it is elected as the DR on the WAN subnet. Which command sequence must be configured?"
  exhibit: |
    WAN OSPF segment summary:
    - subnet is 10.0.0.32/27
    - R2 must use a valid IP in that subnet
    - R2 must have a higher OSPF priority than R1 to become DR

    Task:
