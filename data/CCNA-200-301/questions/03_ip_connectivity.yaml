- id: IC-091
  topic: IP Connectivity
  subtopic: "OSPF"
  type: single_choice
  difficulty: medium
  tags: [ospf, dr-election, bdr, priority]
  question: "Refer to the exhibit. R5 is the current DR on the network, and R4 is the BDR. Their interfaces are flapping, so a network engineer wants the OSPF network to elect a different DR and BDR. Which set of configurations must the engineer implement?"
  exhibit: |
    Current OSPF election state on the shared segment:
    - R5 is DR
    - R4 is BDR

    Goal:
    - move DR and BDR roles to different routers
    - use valid OSPF interface priorities

    Reminder:
    - higher interface priority wins
    - valid range is 0 to 255
  options:
    A: "R4(config)#interface gi0/0
R4(config-if)#ip ospf priority 20

R5(config)#interface gi0/0
R5(config-if)#ip ospf priority 10"
    B: "R3(config)#interface gi0/0
R3(config-if)#ip ospf priority 120

R4(config)#interface gi0/0
R4(config-if)#ip ospf priority 110"
    C: "R3(config)#interface gi0/0
R3(config-if)#ip ospf priority 255

R2(config)#interface gi0/0
R2(config-if)#ip ospf priority 240"
    D: "R2(config)#interface gi0/0
R2(config-if)#ip ospf priority 259

R3(config)#interface gi0/0
R3(config-if)#ip ospf priority 256"
  correct_answer: C
  explanation: "On a broadcast network, OSPF elects the DR and BDR based on interface priority. Assigning the highest valid priorities to R3 and R2 makes them the new DR and BDR."
  source: 3-IP-Connectivity_151/IC-091.png

