  topic: Network Fundamentals
  subtopic: Virtualization
  type: single_choice
  difficulty: easy
  tags:
  - virtualization
  - resources
  question: What must be considered before deploying virtual machines?
  options:
    A: resource limitations, such as the number of CPU cores and the amount of memory
    B: support for physical peripherals, such as monitors, keyboards, and mice
    C: whether to leverage VSM to map multiple virtual processors to two or more virtual machines
    D: location of the virtual machines within the data center environment
  correct_answer: A
  explanation: Virtual machines share host resources, so CPU and memory capacity must be planned before deployment.

- id: NF-053
  topic: Network Fundamentals
  subtopic: Transport
  type: single_choice
  difficulty: easy
  tags:
  - tcp
  - udp
  - reliability
  question: Under which condition is TCP preferred over UDP?
  options:
    A: UDP is used when low latency is optimal, and TCP is used when latency is tolerable.
    B: TCP is used when dropped data is more acceptable, and UDP is used when data is accepted out-of-order.
    C: TCP is used when data reliability is critical, and UDP is used when missing packets are acceptable.
    D: UDP is used when data is highly interactive, and TCP is used when data is time-sensitive.
  correct_answer: C
  explanation: TCP is preferred when reliable delivery matters more than speed, while UDP is acceptable when some loss can
    be tolerated.

- id: NF-054
  topic: Network Fundamentals
  subtopic: Ethernet
  type: multiple_choice
  difficulty: medium
  tags:
  - ethernet
  - late-collisions
  - duplex
  question: What are two reasons that cause late collisions to increment on an Ethernet interface? (Choose two.)
  options:
    A: when Carrier Sense Multiple Access/Collision Detection is used
    B: when one side of the connection is configured for half-duplex
    C: when the sending device waits 15 seconds before sending the frame again
    D: when a collision occurs after the 32nd byte of a frame has been transmitted
    E: when the cable length limits are exceeded
  correct_answer:
  - B
  - E
  explanation: Late collisions are commonly caused by duplex mismatches and excessive cable length or other physical design
    problems.

- id: NF-055
  topic: Network Fundamentals
  subtopic: IPv6
  type: single_choice
  difficulty: easy
  tags:
  - ipv6
  - global-unicast
  question: Which type of IPv6 address is publicly routable in the same way as IPv4 public addresses?
  options:
    A: multicast
    B: unique local
    C: link-local
    D: global unicast
  correct_answer: D
  explanation: Global unicast IPv6 addresses are Internet-routable, similar to public IPv4 addresses.

- id: NF-056
  topic: Network Fundamentals
  subtopic: Security
  type: single_choice
  difficulty: easy
  tags:
  - firewall
  - segmentation
  question: Which device segregates a network into separate zones that have their own security policies?
  options:
    A: IPS
    B: switch
    C: access point
    D: firewall
  correct_answer: D
  explanation: A firewall separates network segments and enforces security policies between them.

- id: NF-057
  topic: Network Fundamentals
  subtopic: Virtualization
  type: single_choice
  difficulty: easy
  tags:
  - virtualization
  - hypervisor
  question: Which component controls and distributes physical resources for each virtual machine?
  options:
    A: hypervisor
    B: OS
    C: CPU
    D: physical enclosure
  correct_answer: A
  explanation: The hypervisor allocates host resources such as CPU and memory to the virtual machines.

- id: NF-058
  topic: Network Fundamentals
  subtopic: Ethernet
  type: single_choice
  difficulty: medium
  tags:
  - duplex
  - auto-negotiation
  - troubleshooting
  question: Refer to the exhibit. PC1 is manually configured for 100 Mb/s full duplex, while the switch port is set to auto
    speed and auto duplex. The link is up but performing poorly. Which interface condition is causing the problem?
  exhibit: 'Ethernet mismatch scenario:

    - PC1 is manually set to 100 Mb/s full duplex

    - switch interface is left at auto speed and auto duplex

    - link is up, but performance is poor


    Task:

    - identify the interface condition created by this mixed negotiation setup

    '
  options:
    A: There is an issue with the fiber on the switch interface.
    B: There is a duplex mismatch on the interface.
    C: There is an interface type mismatch.
    D: There is a speed mismatch on the interface.
  correct_answer: B
  explanation: When one side is manually set and the other relies on auto-negotiation, the auto side can fall back to half-duplex,
    creating a duplex mismatch.
  source: 1-Network-Fundamentals_83/NF-058.png

- id: NF-059
  topic: Network Fundamentals
  subtopic: Subnetting
  type: single_choice
  difficulty: easy
  tags:
  - ipv4
  - subnet-mask
  question: An engineer must update the configuration on two PCs in different subnets to communicate locally with each other.
    One PC is configured with IP address 192.168.25.128/25 and the other with 192.168.25.100/25. Which network mask must the
    engineer configure on both PCs to enable the communication?
  options:
    A: 255.255.255.248
    B: 255.255.255.224
    C: 255.255.255.0
    D: 255.255.255.252
  correct_answer: C
  explanation: A /24 mask places both hosts in the same 192.168.25.0 network.

- id: NF-060
  topic: Network Fundamentals
  subtopic: Cloud
  type: single_choice
  difficulty: easy
  tags:
  - cloud
  - saas
  question: A manager asks a network engineer to advise which cloud service model is used so employees do not have to waste
    their time installing, managing, and updating software that is only used occasionally. Which cloud service model does
    the engineer recommend?
  options:
    A: infrastructure-as-a-service
    B: platform-as-a-service
    C: business process as a service to support different types of service
    D: software-as-a-service
  correct_answer: D
  explanation: SaaS delivers the application over the Internet so users do not need to install or maintain it locally.

- id: NF-061
  topic: Network Fundamentals
  subtopic: IPv6
  type: multiple_choice
  difficulty: hard
  tags:
  - ipv6
  - eui-64
  - interface-config
  question: Refer to the exhibit. IPv6 must be implemented on R1 to the ISP. The uplink between R1 and the ISP must use a
    manual assignment, and the LAN interface must self-provision. Both connections must use the applicable IPv6 networks.
    Which two configurations must be applied to R1? (Choose two.)
  exhibit: 'IPv6 addressing requirements:

    - ISP uplink on Gi0/1 must use a manual IPv6 assignment

    - LAN interface on Gi0/0 must self-generate its interface ID

    - both interfaces must use the correct prefixes from the exhibit


    Task:

    - choose the manual /127 WAN address

    - choose the LAN /64 configuration that uses EUI-64

    '
  options:
    A: interface Gi0/1 ipv6 address 2001:db8:0f1b:fccb:acce:fced:abcd:fa03/127
    B: interface Gi0/0 ipv6 address 2001:db8:0:afff::/64 eui-64
    C: interface Gi0/1 ipv6 address 2001:db8:0f1b:fccb:acce:fced:abcd:fa02/127
    D: interface Gi0/0 ipv6 address 2001:db8:0:afff::/64 eui-64
    E: interface Gi0/1 ipv6 address 2001:db8:0f1b:fccb:acce:fced:abcd:fa00/127
  correct_answer:
  - A
  - D
  explanation: The WAN link uses a manual /127 address on the ISP-facing interface, while the LAN interface uses the /64 prefix
    with EUI-64 for self-generated addressing.
  source: 1-Network-Fundamentals_83/NF-061.png

- id: NF-062
  topic: Network Fundamentals
  subtopic: Subnetting
  type: single_choice
  difficulty: medium
  tags:
  - subnetting
  - svi
  - layer3-switch
  question: The address block 192.168.32.0/24 must be subnetted into smaller networks. The engineer must create 8 new subnets,
    each supporting just over 30 hosts. Interface VLAN 10 must use the last usable IP in the first new subnet, and the interface
    is a Layer 3 interface. Which configuration must be applied to the interface?
  options:
    A: 'no switchport mode trunk

      ip address 192.168.32.97 255.255.255.224'
    B: 'switchport

      ip address 192.168.32.65 255.255.255.240'
    C: 'no switchport

      ip address 192.168.32.30 255.255.255.224'
    D: 'no switchport mode access

      ip address 192.168.32.62 255.255.255.240'
  correct_answer: C
  explanation: Eight subnets from a /24 requires borrowing 3 bits, resulting in /27 networks. The first /27 is 192.168.32.0/27,
    and its last usable IP is 192.168.32.30.

- id: NF-063
  topic: Network Fundamentals
  subtopic: Cabling
  type: multiple_choice
  difficulty: easy
  tags:
  - fiber
  - copper
  question: What are two differences between optical-fiber cabling and copper cabling? (Choose two.)
  options:
    A: A BNC connector is used for fiber connections.
    B: The glass core component is encased in a cladding.
    C: The data can pass through the cladding.
    D: Light is transmitted through the core of the fiber.
    E: Fiber connects to physical interfaces using RJ-45 connections.
  correct_answer:
  - B
  - D
  explanation: Fiber uses a glass core surrounded by cladding, and it carries light through the core rather than electrical
    signals.

- id: NF-064
  topic: Network Fundamentals
  subtopic: Ethernet
  type: single_choice
  difficulty: easy
  tags:
  - late-collision
  - interfaces
  question: A device detects two stations transmitting frames at the same time. This condition occurs after the first 64 bytes
    of the frame are received. Which interface counter increments?
  options:
    A: runt
    B: collision
    C: late collision
    D: CRC
  correct_answer: C
  explanation: A collision detected after the first 64 bytes have been transmitted is counted as a late collision.

- id: NF-065
  topic: Network Fundamentals
  subtopic: IPv6
  type: single_choice
  difficulty: hard
  tags:
  - ipv6
  - eui-64
  - modified-eui64
  question: Refer to the exhibit. An engineer is configuring the HO router. Which IPv6 address configuration must be applied
    to the router Fa0/1 interface for the router to assign a unique 64-bit IPv6 address to itself?
  exhibit: 'Modified EUI-64 task:

    - interface Fa0/1 must generate its IPv6 interface ID from the MAC address shown in the exhibit


    Key rule:

    - insert FFFE in the middle of the MAC-derived value

    - flip the universal/local bit in the first byte

    '
  options:
    A: ipv6 address 2001:db8:0:1:ffff:c601:420f:7/64
    B: ipv6 address 2001:db8:0:1:fe80:c601:420f:7/64
    C: ipv6 address 2001:db8:0:1:c601:42ff:fe0f:7/64
    D: ipv6 address 2001:db8:0:1:c601:42fe:800f:7/64
  correct_answer: C
  explanation: Modified EUI-64 inserts FFFE into the MAC-derived interface ID and flips the universal/local bit, producing
    c601:42ff:fe0f:7 from MAC C601.420F.0007.
  source: 1-Network-Fundamentals_83/NF-065.png

- id: NF-066
  topic: Network Fundamentals
  subtopic: WAN
  type: multiple_choice
  difficulty: easy
  tags:
  - soho
  - broadband
  - wan
  question: What are two characteristics of a small office / home office connection environment? (Choose two.)
  options:
    A: It requires 10Gb ports on all uplinks.
    B: It supports between 1 and 50 users.
    C: It supports between 50 and 100 users.
    D: A router port connects to a broadband connection.
    E: It requires a core, distribution, and access layer architecture.
  correct_answer:
  - B
  - D
  explanation: SOHO networks are small and commonly use broadband Internet access through a router.

- id: NF-067
  topic: Network Fundamentals
  subtopic: Cabling
  type: single_choice
  difficulty: easy
  tags:
  - ethernet
  - straight-through
  - mdix
  question: 'Which cable type must be used when connecting a router and switch together using these criteria: pins 1 and 2
    are receivers, pins 3 and 6 are transmitters, and auto detection MDI-X is unavailable?'
  options:
    A: crossover
    B: rollover
    C: console
    D: straight-through
  correct_answer: D
  explanation: Router-to-switch is a connection between unlike Ethernet devices, so a straight-through cable is used when
    auto-MDI/MDIX is unavailable.

- id: NF-068
  topic: Network Fundamentals
  subtopic: Subnetting
  type: single_choice
  difficulty: medium
  tags:
  - ipv4
  - subnetting
  - svi
  question: An office has 8 floors with approximately 30 to 40 users per floor. One subnet must be used. Which command must
    be configured on the router Switched Virtual Interface to use address space efficiently?
  options:
    A: ip address 192.168.0.0 255.255.0.0
    B: ip address 192.168.0.0 255.255.254.0
    C: ip address 192.168.0.0 255.255.255.128
    D: ip address 192.168.0.0 255.255.255.224
  correct_answer: B
  explanation: About 320 hosts are needed, so a /23 mask provides enough usable addresses without wasting as much space as
    a /16.

- id: NF-069
  topic: Network Fundamentals
  subtopic: Switching
  type: single_choice
  difficulty: easy
  tags:
  - errdisable
  - link-flap
  question: What causes a port to be placed in the err-disabled state?
  options:
    A: nothing plugged into the port
    B: link flapping
    C: latency
    D: shutdown command issued on the port
  correct_answer: B
  explanation: Err-disable can be triggered by conditions such as link flapping, BPDU guard violations, port security violations,
    and other interface faults.

- id: NF-070
  topic: Network Fundamentals
  subtopic: Wireless
  type: single_choice
  difficulty: easy
  tags:
  - wireless
  - band-select
  - 5ghz
  question: An engineer observes high usage on the 2.4 GHz channels and lower usage on the 5 GHz channels. What must be configured
    to allow clients to preferentially use 5 GHz access points?
  options:
    A: Client Band Select
    B: Re-Anchor Roamed Clients
    C: EAP Split Tunnel
    D: 11ac MU-MIMO
  correct_answer: A
  explanation: Band Select, also called band steering, encourages capable clients to associate on the 5 GHz band.

- id: NF-071
  topic: Network Fundamentals
  subtopic: IPv6
  type: single_choice
  difficulty: medium
  tags:
  - ipv6
  - slaac
  - eui-64
  question: Which action must be taken to assign a global unicast IPv6 address on an interface that is derived from the MAC
    address of that interface?
  options:
    A: explicitly assign a link-local address
    B: disable the EUI-64 bit process
    C: enable SLAAC on an interface
    D: configure a stateful DHCPv6 server on the network
  correct_answer: C
  explanation: SLAAC allows an interface to self-generate a global unicast IPv6 address, commonly using EUI-64 to derive the
    interface ID from the MAC address.

- id: NF-072
  topic: Network Fundamentals
  subtopic: Subnetting
  type: single_choice
  difficulty: medium
  tags:
  - subnetting
  - summarization
  question: A corporate office uses four floors in a building. Floor 1 has 24 users, Floor 2 has 29 users, Floor 3 has 28
    users, and Floor 4 has 22 users. Which subnet summarizes and gives the most efficient distribution of IP addresses for
    the router configuration?
  options:
    A: 192.168.0.0/24 as summary and 192.168.0.0/28 for each floor
    B: 192.168.0.0/23 as summary and 192.168.0.0/25 for each floor
    C: 192.168.0.0/25 as summary and 192.168.0.0/27 for each floor
    D: 192.168.0.0/26 as summary and 192.168.0.0/29 for each floor
  correct_answer: C
  explanation: Each floor needs up to 30 usable addresses, so /27 works per floor. Four /27 networks summarize neatly into
    a /25.

- id: NF-073
  topic: Network Fundamentals
  subtopic: Wireless
  type: single_choice
  difficulty: easy
  tags:
  - 802.11
  - management-frame
  question: Which 802.11 frame type is Association Response?
  options:
    A: management
    B: protected frame
    C: action
    D: control
  correct_answer: A
  explanation: Association Request and Association Response are 802.11 management frames.

- id: NF-074
  topic: Network Fundamentals
  subtopic: Architecture
  type: single_choice
  difficulty: medium
  tags:
  - cisco-dna-center
  - sdn
  question: What is the functionality of the Cisco DNA Center?
  options:
    A: IP address pool distribution scheduler
    B: data center network policy controller
    C: console server that permits secure access to all network devices
    D: software-defined controller for automation of devices and services
  correct_answer: D
  explanation: Cisco DNA Center provides centralized policy, automation, assurance, and management in a controller-based architecture.

- id: NF-075
  topic: Network Fundamentals
  subtopic: WAN
  type: single_choice
  difficulty: easy
  tags:
  - soho
  - broadband
  question: What is a characteristic of a SOHO network?
  options:
    A: includes at least three tiers of devices to provide load balancing and redundancy
    B: connects each switch to every other switch in the network
    C: enables multiple users to share a single broadband connection
    D: provides high throughput access for 1000 or more users
  correct_answer: C
  explanation: A SOHO network typically lets a small number of users share a broadband connection.

- id: NF-076
  topic: Network Fundamentals
  subtopic: Transport
  type: single_choice
  difficulty: easy
  tags:
  - tcp
  - udp
  - connectionless
  question: How do TCP and UDP fit into a query-response model?
  options:
    A: TCP avoids using sequencing and UDP avoids using acknowledgments.
    B: TCP establishes a connection prior to sending data, and UDP sends immediately.
    C: TCP encourages out-of-order packet delivery, and UDP prevents re-ordering.
    D: TCP uses error detection for packets, and UDP uses error recovery.
  correct_answer: B
  explanation: TCP is connection-oriented and uses a session before data transfer, while UDP is connectionless and transmits
    without establishing one.

- id: NF-077
  topic: Network Fundamentals
  subtopic: IP Addressing
  type: single_choice
  difficulty: easy
  tags:
  - private-ipv4
  - rfc1918
  question: What is a benefit of using private IPv4 addressing?
  options:
    A: Multiple companies can use the same addresses without conflicts.
    B: Direct connectivity is provided to internal hosts from outside an enterprise network.
    C: Communication to the Internet is reachable without the use of NAT.
    D: All external hosts are provided with secure communication to the Internet.
  correct_answer: A
  explanation: Private IPv4 space can be reused independently by different organizations because it is not globally routed
    on the Internet.

- id: NF-078
  topic: Network Fundamentals
  subtopic: Cabling
  type: single_choice
  difficulty: easy
  tags:
  - crossover
  - mdix
  - ethernet
  question: 'Which cable type must be used when connecting two like devices together using these criteria: pins 1 and 3 and
    2 and 6 are required, and auto detection MDI-X is unavailable?'
  options:
    A: straight-through
    B: console
    C: crossover
    D: rollover
  correct_answer: C
  explanation: A crossover cable is used to connect like Ethernet devices when auto-MDI/MDIX is not available.

- id: NF-079
  topic: Network Fundamentals
  subtopic: Virtualization
  type: single_choice
  difficulty: easy
  tags:
  - virtualization
  - servers
  question: Which technology allows for multiple operating systems to be run on a single host computer?
  options:
    A: virtual routing and forwarding
    B: virtual device contexts
    C: network port ID virtualization
    D: server virtualization
  correct_answer: D
  explanation: Server virtualization allows a single physical host to run multiple virtual machines with different operating
    systems.

- id: NF-080
  topic: Network Fundamentals
  subtopic: Ethernet
  type: single_choice
  difficulty: medium
  tags:
  - duplex
  - crc
  - interface-counters
  question: Router-WAN1 has a new connection via Gi0/0 to the ISP. Users running web applications indicate that connectivity
    is unstable to the Internet. What is causing the interface issue?
  exhibit: "Router-WAN1#show interface g0/0\nGigabitEthernet0/0 is up, line protocol is up\n  Hardware is CSR NIC, address\
    \ is 5000.0001.0000 (bia 5000.0001.0000)\n  Internet address is 192.168.0.0/31\n  MTU 1500 bytes, BW 1000000 Kbit/sec,\
    \ DLY 10 usec,\n     reliability 255/255, txload 1/255, rxload 1/255\n  Encapsulation ARPA, loopback not set\n  Keepalive\
    \ set (10 sec)\n  Full Duplex, 1000Mbps, link type is auto, media type is NIC\n  output flow-control is unsupported, input\
    \ flow-control is unsupported\n  ARP type: ARPA, ARP Timeout 04:00:00\n  Last input never, output 00:00:03, output hang\
    \ never\n  Last clearing of \"show interface\" counters never\n  Input queue: 0/375/0 (size/max/drops/flushes); Total\
    \ output drops: 0\n  Queueing strategy: fifo\n  Output queue: 0/40 (size/max)\n  5 minute input rate 1000 bits/sec, 0\
    \ packets/sec\n  5 minute output rate 2000 bits/sec, 1 packets/sec\n     0 packets input, 0 bytes, 0 no buffer\n     Received\
    \ 110 broadcasts (0 IP multicasts)\n     0 runts, 0 giants, 0 throttles\n     100 input errors, 100 CRC, 100 frame, 0\
    \ overrun, 0 ignored\n     0 watchdog, 0 multicast, 0 pause input\n     260 packets output, 8970 bytes, 0 underruns\n\
    \     0 output errors, 0 collisions, 0 interface resets\n     0 unknown protocol drops\n     0 babbles, 0 late collision,\
    \ 0 deferred\n     1 lost carrier, 0 no carrier, 0 pause output\n\nTask:\n- identify the physical/interface condition\
    \ most strongly indicated by these counters"
  options:
    A: The receive buffer is full due to a broadcast storm.
    B: Frames are discarded due to a half-duplex negotiation.
    C: Broadcast packets are rejected because ARP timeout is enabled.
    D: Small frames less than 64 bytes are rejected due to size.
  correct_answer: B
  explanation: Input errors, CRCs, and frame errors are classic indicators of a duplex mismatch, which often results in one
    side operating at half-duplex.

- id: NF-081
  topic: Network Fundamentals
  subtopic: Architecture
  type: single_choice
  difficulty: easy
  tags:
  - collapsed-core
  - campus
  question: What is a characteristic of a collapsed-core network topology?
  options:
    A: It enables all workstations in a SOHO environment to connect on a single switch with Internet access.
    B: It enables the core and access layers to connect to one logical distribution device over an EtherChannel.
    C: It allows wireless devices to connect directly to the core layer, which enables faster data transmission.
    D: It allows the core and distribution layers to run as a single combined layer.
  correct_answer: D
  explanation: In a collapsed-core design, the core and distribution roles are merged into one combined layer.

- id: NF-082
  topic: Network Fundamentals
  subtopic: IPv6
  type: single_choice
  difficulty: easy
  tags:
  - ipv6
  - multicast
  question: Which IPv6 address block forwards packets to a multicast address rather than a unicast address?
  options:
    A: 2000::/3
    B: FC00::/7
    C: FE80::/10
    D: FF00::/12
  correct_answer: D
  explanation: IPv6 multicast addresses use the FF00::/8 space; among the options provided, FF00::/12 identifies the multicast
    block.

- id: NF-083
  topic: Network Fundamentals
  subtopic: Wireless
  type: single_choice
  difficulty: easy
  tags:
  - 802.11
  - probe-response
  - management-frame
  question: Which 802.11 frame type is indicated by a probe response after a client sends a probe request?
  options:
    A: data
    B: management
    C: control
    D: action
  correct_answer: B
  explanation: Probe Request and Probe Response are 802.11 management frames.
