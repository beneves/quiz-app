- id: NF-013
  topic: Network Fundamentals
  subtopic: Switching
  type: simulation_lab
  difficulty: hard
  tags:
  - vlan
  - trunk
  - etherchannel
  question: Simulation lab. Complete the trunk and link-aggregation tasks using the exhibit image and the device consoles.
  exhibit: |
    Guidelines
    This is a lab item in which tasks will be performed on virtual devices.
    Refer to the Tasks tab to view the tasks for this lab item.
    Refer to the Topology tab to access the device console(s) and perform the tasks.
    Console access is available for all required devices by clicking the device icon or using the tab(s) above the console window.
    All necessary pre-configurations have been applied.
    Do not remove any existing configurations from the devices, only those necessary to make the appropriate changes required to fulfill the listed tasks.
    Do not change the enable password or hostname for any device.
    Save your configurations to NVRAM before moving to the next item.
    Click Next at the bottom of the screen to submit this lab and move to the next question.
    When Next is clicked, the lab closes and cannot be reopened.

    Task 1
    Configure trunks between Sw1 and Sw2 on ports E0/0 and E0/1 using the IEEE standard frame tagging method.
    Add VLAN 99 as untagged on the trunk ports.
    Only extend VLAN 110 and the untagged VLAN across the trunk.
    Verify that PC1 is capable of pinging PC2.

    Task 2
    On Sw1 and Sw2, use IEEE 802.3ad link aggregation.
    Combine E0/0 and E0/1 into a single logical link while leaving the trunk configurations intact.
    Assign number 20 to the link.
    Both links must negotiate aggregation.
  explanation: This lab requires 802.1Q trunks between SW1 and SW2, native VLAN 99, only VLANs 110 and 99 across the trunk, and IEEE 802.3ad link aggregation using Port-channel 20 with negotiation on both links.
  source: 1-Network-Fundamentals_83/NF-013.png
  lab:
    intro: Use the exhibit image as the topology reference and complete both the trunking and IEEE 802.3ad link-aggregation tasks before submitting the lab.
    objectives:
    - Configure E0/0 and E0/1 between SW1 and SW2 as 802.1Q trunks.
    - Configure VLAN 99 as the untagged native VLAN on the trunks.
    - Allow only VLAN 110 and VLAN 99 across the trunks.
    - Verify end-to-end connectivity between PC1 and PC2.
    - Bundle E0/0 and E0/1 into Port-channel 20 using IEEE 802.3ad negotiation on both switches.
    - Save the configuration before submission.
    initial_prompt: SW1#
    image: 1-Network-Fundamentals_83/NF-013.png
    required_commands:
    - configure terminal
    - interface range e0/0 - 1
    - switchport mode trunk
    - switchport trunk allowed vlan 110,99
    - switchport trunk native vlan 99
    - channel-group 20 mode active
    - end
    verification_commands:
    - show running-config
    command_responses:
      interface range e0/0 - 1: OK
      switchport mode trunk: OK
      switchport trunk encapsulation dot1q: OK
      switchport trunk allowed vlan 110,99: OK
      switchport trunk native vlan 99: OK
      channel-group 20 mode active: OK
      show running-config: Verify the trunk configuration, native VLAN 99, allowed VLAN list, and Port-channel 20 settings on both switches.

