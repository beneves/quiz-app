- id: IS-030
  topic: IP Services
  subtopic: "NAT"
  type: single_choice
  difficulty: hard
  tags: [nat, pat, acl, vlan, topology]
  exhibit: |
    Topology:

                          [Internet]
                               |
                         Interface g1/0/0
                      IP: 209.165.201.2/27
                            [Router]
                           /        \
               g2/0/1.100            g2/0/1.200
           IP: 192.168.100.1/27   IP: 192.168.100.33/27
              VLAN 100                  VLAN 200
                  |                         |
            [SW + PCs]                 [SW + PCs]
            (192.168.100.0/27)         (192.168.100.32/27)
  question: "Refer to the exhibit. Which configuration must be applied to the router to configure PAT to translate all addresses in VLAN 200 while allowing devices on VLAN 100 to use their own IP addresses?"
  options:
    A: |
      access-list 99 permit 192.168.100.32 0.0.0.31
      ip nat inside source list 99 interface g1/0/0 overload
      interface g2/0/1.200
       ip nat inside
      interface g1/0/0
       ip nat outside
    B: |
      access-list 99 permit 192.168.100.0 0.0.0.31
      ip nat inside source list 99 interface g1/0/0 overload
      interface g2/0/1.100
       ip nat inside
      interface g1/0/0
       ip nat outside
    C: |
      access-list 99 permit 192.168.100.32 0.0.0.31
      ip nat outside source list 99 interface g1/0/0 overload
      interface g2/0/1.200
       ip nat inside
      interface g1/0/0
       ip nat outside
    D: |
      access-list 99 permit 192.168.100.0 0.0.0.31
      ip nat inside source list 99 interface g1/0/0 overload
      interface g2/0/1.200
       ip nat inside
      interface g1/0/0
       ip nat outside
  correct_answer: A
  explanation: "VLAN 200 uses subnet 192.168.100.32/27. The ACL wildcard for /27 is 0.0.0.31, so 'permit 192.168.100.32 0.0.0.31' matches the entire VLAN 200 range. PAT uses 'ip nat inside source ... overload', with g2/0/1.200 marked inside and g1/0/0 (internet) marked outside. VLAN 100 devices keep their own IPs since they are not included in the ACL."
  source: 4-IP-Services_57/IS-030.png

- id: IS-031
  topic: IP Services
  subtopic: "SSH Configuration"
  type: single_choice
  difficulty: medium
  tags: [ssh, rsa, cisco-cli]
  exhibit: |
    Router# show running-config
    Building configuration...

    Current configuration: 1130 bytes
    !
    Last configuration change at 11:02:33 UTC Sat Oct 10 2020
    upgrade fpd auto
    version 12.4
    service timestamps debug datetime msec
    service timestamps log datetime msec
    no service password-encryption
    !
    hostname Router
    !
    boot-start-marker
    boot-end-marker
    !
    no aaa new-model
    no ip setup-rate limit unreachable
    !
     -- More --

    (Note: no ip domain-name, no crypto key, no ip ssh version, no transport input ssh configured)
  question: "Refer to the exhibit. Which minimum configuration items are needed to enable Secure Shell version 2 access to R15?"
  options:
    A: |
      hostname R15
      ip domain-name cisco.com
      crypto key generate rsa general-keys modulus 1024
      ip ssh version 2
      line vty 0 15
      transport input ssh
    B: |
      crypto key generate rsa general-keys modulus 1024
      ip ssh version 2
      line vty 0 15
      transport input ssh
      ip ssh logging events
      ip ssh stricthostkeycheck
    C: |
      hostname R15
      crypto key generate rsa general-keys modulus 1024
      line vty 0 15
      transport input ssh
      ip ssh source-interface Fa0/0
      ip ssh stricthostkeycheck
    D: |
      ip domain-name cisco.com
      crypto key generate rsa general-keys modulus 1024
      ip ssh version 2
      line vty 0 15
      transport input all
      ip ssh logging events
  correct_answer: A
  explanation: "SSH v2 requires: (1) hostname — current is 'Router', must be 'R15'; (2) ip domain-name — used together with hostname to generate RSA keys; (3) crypto key generate rsa — creates the key pair (min 768 bits for SSHv2); (4) ip ssh version 2 — enforces SSHv2 only; (5) line vty + transport input ssh — restricts remote access to SSH. Option B lacks hostname/domain-name; Option C lacks ip domain-name; Option D has 'transport input all' (allows Telnet) and lacks hostname."
  source: 4-IP-Services_57/IS-031.png

