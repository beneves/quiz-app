- id: IS-047
  topic: IP Services
  subtopic: "Static Routing"
  type: multiple_choice
  difficulty: medium
  tags: [static-routing, default-route, redundancy, load-balancing, topology]
  exhibit: |
    Topology:

           ISP 1                 ISP 2
       198.51.100.1           203.0.113.1
              \                   /
               \                 /
            [Headquarters]
            (CPE Router)
  question: "Refer to the exhibit. A network administrator configures the CPE router to provide internet access to the company headquarters. Traffic must be load-balanced via ISP1 and ISP2 to ensure redundancy. Which two commands set this configuration on the CPE router? (Choose two.)"
  options:
    A: |
      ip route 0.0.0.0 0.0.0.0 198.51.100.1 255
      ip route 0.0.0.0 0.0.0.0 203.0.113.1 255
      ip route 128.0.0.0 128.0.0.0 203.0.113.1
    B: |
      ip route 0.0.0.0 128.0.0.0 198.51.100.1
      ip route 128.0.0.0 128.0.0.0 203.0.113.1
      ip route 0.0.0.0 0.0.0.0 198.51.100.1
      ip route 0.0.0.0 0.0.0.0 203.0.113.1
    C: |
      ip route 0.0.0.0 0.0.0.0 198.51.100.1
      ip route 0.0.0.0 0.0.0.0 203.0.113.1
    D: |
      ip route 0.0.0.0 128.0.0.0 198.51.100.1
      ip route 128.0.0.0 128.0.0.0 203.0.113.1
    E: |
      ip route 0.0.0.0 0.0.0.0 198.51.100.1
      ip route 0.0.0.0 0.0.0.0 203.0.113.2
  correct_answer: [C, D]
  explanation: "Option C configures two equal-cost default routes (ECMP) — one to each ISP — enabling load balancing. Option D uses split default routing (0/1 via ISP1, 128/1 via ISP2), which also distributes traffic across both links. Together they represent the two valid approaches for dual-ISP load balancing. Option E is wrong (203.0.113.2 is not ISP2's address). Option A uses invalid syntax (255 AD with /0 masks). Option B mixes approaches without adding value."
  source: 4-IP-Services_57/IS-047.png

