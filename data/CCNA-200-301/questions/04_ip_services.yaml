- id: IS-054
  topic: IP Services
  subtopic: "NAT"
  type: single_choice
  difficulty: medium
  tags: [nat, pat, acl, vlan, topology]
  exhibit: |
    Topology:

    [VLAN 100]  [VLAN 200]
    10.10.10.0/24  10.10.20.0/24
           \        /
          [Router]
               |
          [Internet]

    Router config (partial):
      interface GigabitEthernet0
       ip address [ISP IP] [mask]
       ip nat outside
      !
      interface GigabitEthernet1
       ip address 10.10.10.254 255.255.255.0
       ip nat inside
      !
      ip nat inside source list NAT_INSIDE_RANGES interface GigabitEthernet0 overload
      !
      ip access-list standard NAT_INSIDE_RANGES
       10 permit 10.10.10.0 0.0.0.255
       (VLAN 200 range 10.10.20.0/24 not included)
  question: "Refer to the exhibit. Users on existing VLAN 100 can reach sites on the Internet. Which action must the administrator take to establish connectivity to the Internet for users in VLAN 200?"
  options:
    A: "Define a NAT pool on the router."
    B: "Configure the ip nat outside command on another interface for VLAN 200."
    C: "Configure static NAT translations for VLAN 200."
    D: "Update the NAT_INSIDE_RANGES ACL."
  correct_answer: D
  explanation: "The NAT_INSIDE_RANGES ACL only permits 10.10.10.0/24 (VLAN 100). VLAN 200 uses 10.10.20.0/24, which is not in the ACL, so its traffic is not translated. Adding a permit entry for 10.10.20.0 0.0.0.255 to the ACL will allow VLAN 200 users to reach the internet. No additional interface or pool changes are needed since PAT is already configured."
  source: 4-IP-Services_57/IS-054.png

