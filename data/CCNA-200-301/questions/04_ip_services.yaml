- id: IS-023
  topic: IP Services
  subtopic: "NAT"
  type: single_choice
  difficulty: medium
  tags: [nat, pat, inside-outside, topology]
  exhibit: |
    Topology:

        [PC1] ---+
      172.16.0.1 |
                 [NAT-Router] --- [Internet]
      172.16.0.2 |
        [PC2] ---+

    Router config:
      interface GigabitEthernet0/0
       ip address 172.16.0.254 255.255.255.0
       duplex auto
       speed auto
      !
      interface GigabitEthernet0/1
       ip address 209.165.200.1 255.255.255.252
       duplex auto
       speed auto
      !
      access-list 1 permit 172.16.0.0 0.0.0.255
      ip nat inside source list 1 interface GigabitEthernet0/1 overload

      (ip nat inside / ip nat outside not configured on either interface)
  question: "Refer to the exhibit. How should the configuration be updated to allow PC1 and PC2 access to the internet?"
  options:
    A: "Modify the configured number of the second access list"
    B: "Change the ip nat inside source command to use interface GigabitEthernet0/0"
    C: "Remove the overload keyword from the ip nat inside source command"
    D: "Add either the ip nat inside or ip nat outside command under both interfaces"
  correct_answer: D
  explanation: "For NAT to function, the router interfaces must be marked with 'ip nat inside' (LAN-facing) and 'ip nat outside' (WAN-facing). The access-list and ip nat inside source command are present, but neither interface has the direction command applied."
