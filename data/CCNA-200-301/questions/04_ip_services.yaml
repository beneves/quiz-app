- id: IS-033
  topic: IP Services
  subtopic: "DHCP Snooping"
  type: equivalence_buttons
  difficulty: medium
  tags: [dhcp, snooping, security]
  question: |
    Match each DHCP snooping term (left) to its correct description (right).
    Original format: drag and drop.

    Terms:
      1. DHCP server
      2. snooping binding database
      3. spurious DHCP server
      4. trusted
      5. untrusted

    Descriptions (shuffled):
      A. default state of all switch interfaces; DHCP server messages received on these ports are discarded
      B. list of hosts on the network recorded by DHCP snooping (MAC, IP, VLAN, interface, lease time)
      C. interface port state that permits DHCP server messages to be forwarded; assigned to ports facing the legitimate DHCP server
      D. unknown DHCP server within an administrative domain; rogue server not under the control of the network administrator
      E. network component that propagates IP addresses to hosts on the network
  left_items:
    "1": "DHCP server"
    "2": "snooping binding database"
    "3": "spurious DHCP server"
    "4": "trusted"
    "5": "untrusted"
  right_items:
    A: "default state of all switch interfaces; DHCP server messages received on these ports are discarded"
    B: "list of hosts on the network recorded by DHCP snooping (MAC, IP, VLAN, interface, lease time)"
    C: "interface port state that permits DHCP server messages to be forwarded; assigned to ports facing the legitimate DHCP server"
    D: "unknown DHCP server within an administrative domain; rogue server not under the control of the network administrator"
    E: "network component that propagates IP addresses to hosts on the network"
  correct_matches:
    "1": "E"
    "2": "B"
    "3": "D"
    "4": "C"
    "5": "A"
  explanation: "DHCP snooping classifies ports as trusted (toward the real DHCP server) or untrusted (client-facing, default). The binding database records valid host assignments. A spurious server is a rogue DHCP server whose OFFER/ACK messages are dropped on untrusted ports."
  source: 4-IP-Services_57/IS-033.png

