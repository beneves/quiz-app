- id: SF-001
  topic: Security Fundamentals
  subtopic: ACLs
  type: multiple_choice
  difficulty: medium
  tags:
  - acl
  - ipv4
  - permit
  - deny
  - sequence
  question: While examining excessive traffic on the network, it is noted that all incoming packets on an interface appear to be allowed even though an IPv4 ACL is applied to the interface. Which two misconfigurations cause this behavior? (Choose two.)
  options:
    A: The ACL is empty
    B: A matching permit statement is too broadly defined
    C: The packets fail to match any permit statement
    D: A matching deny statement is too high in the access list
    E: A matching permit statement is too high in the access list
  correct_answer:
  - B
  - E
  explanation: Traffic can be allowed unexpectedly if a permit statement is overly broad or if a permit entry appears before a more specific deny entry. ACLs are processed top down, and the first match wins.
  source: adapted_from_images

- id: SF-002
  topic: Security Fundamentals
  subtopic: ACLs
  type: multiple_choice
  difficulty: hard
  tags:
  - acl
  - extended-acl
  - wildcard-mask
  - interface-direction
  exhibit: "Topology:\n\n  Internet -- Gi0/1 R1 Gi0/2 -- Gi0/1 R2\n                 |                         |\n                Gi0/3                    Gi0/2\n                 |                         |\n               Switch                    Switch\n                 |                         |\n            PC: 10.0.20.0/26         PC: 10.0.10.0/26\n\nR2 configuration shown:\n\n  R2# config t\n  R2(config)#access-list 101 deny tcp 10.0.20.0 0.0.0.63 10.0.10.0 0.0.0.63 eq smtp\n  R2(config)#access-list 101 deny tcp 10.0.20.0 0.0.0.63 10.0.10.0 0.0.0.63 eq www\n  R2(config)#int gi0/2\n  R2(config-if)# ip access-group 101 in\n"
  question: Refer to the exhibit. An extended ACL has been configured and applied to router R2. The configuration failed to work as intended. Which two changes stop outbound traffic on TCP ports 25 and 80 to 10.0.20.0/26 from the 10.0.10.0/26 subnet while still allowing all other traffic? (Choose two.)
  options:
    A: Add a `permit ip any any` statement at the end of ACL 101 for allowed traffic.
    B: Add a `permit ip any any` statement at the beginning of ACL 101 for allowed traffic.
    C: The ACL must be moved to the Gi0/1 interface outbound on R2.
    D: The source and destination IPs must be swapped in ACL 101.
    E: The ACL must be configured on the Gi0/2 interface inbound on R1.
  correct_answer:
  - A
  - D
  explanation: The ACL entries must match the actual source and destination correctly, so the source and destination need to be reversed. To allow all other traffic, an explicit `permit ip any any` must be added because of the implicit deny at the end of the ACL.
  source: 5-Security-Fundamentals_88/SF-002.png

- id: SF-003
  topic: Security Fundamentals
  subtopic: Wireless Security
  type: single_choice
  difficulty: easy
  tags:
  - wpa3
  - sae
  - wireless
  question: Which mechanism allows WPA3 to provide a higher degree of security than its predecessors?
  options:
    A: automatic device pairing
    B: SAE password-based key exchange
    C: certificate-based authentication
    D: special-character support in preshared keys
  correct_answer: B
  explanation: WPA3 replaces the older PSK exchange with SAE, which improves resistance to offline password attacks and strengthens the key establishment process.
  source: adapted_from_images

- id: SF-004
  topic: Security Fundamentals
  subtopic: Port Security
  type: multiple_choice
  difficulty: medium
  tags:
  - port-security
  - sticky-mac
  - violation-mode
  exhibit: "Topology:\n\n  SW Gi0/1 -------- host\n\nExisting configuration:\n\n  SW# conf t\n  SW(config)#interface gigabitEthernet0/1\n  SW(config-if)#switchport mode access\n  SW(config-if)#switchport port-security\n"
  question: 'Refer to the exhibit. A network engineer started to configure port security on a new switch. These requirements must be met: MAC addresses must be learned dynamically, and log messages must be generated without disabling the interface when unwanted traffic is seen. Which two commands must be configured to complete this task? (Choose two.)'
  options:
    A: '`SW(config-if)#switchport port-security violation restrict`'
    B: '`SW(config-if)#switchport port-security mac-address 0010.7B84.45E6`'
    C: '`SW(config-if)#switchport port-security maximum 2`'
    D: '`SW(config-if)#switchport port-security violation shutdown`'
    E: '`SW(config-if)#switchport port-security mac-address sticky`'
  correct_answer:
  - A
  - E
  explanation: Sticky MAC learning allows secure MAC addresses to be learned dynamically. The `restrict` violation mode drops offending traffic, increments the violation counter, and generates log or SNMP notifications without shutting down the port.
  source: 5-Security-Fundamentals_88/SF-004.png

- id: SF-005
  topic: Security Fundamentals
  subtopic: VPN Technologies
  type: single_choice
  difficulty: medium
  tags:
  - gre
  - ipsec
  - multicast
  - encryption
  question: Which mechanism carries multicast traffic between remote sites and supports encryption?
  options:
    A: ISATAP
    B: IPsec over ISATAP
    C: GRE
    D: GRE over IPsec
  correct_answer: D
  explanation: GRE can carry multicast and other non-unicast traffic, while IPsec provides confidentiality and integrity. Combining them as GRE over IPsec supports both requirements.
