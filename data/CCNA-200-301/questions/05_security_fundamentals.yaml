- id: SF-006
  topic: Security Fundamentals
  subtopic: AAA
  type: single_choice
  difficulty: easy
  tags:
  - aaa
  - authentication
  - authorization
  - accounting
  question: What is the difference between AAA authentication and authorization?
  options:
    A: Authentication identifies and verifies a user who is attempting to access a system, and authorization controls the tasks the user performs.
    B: Authentication controls the system processes a user accesses, and authorization logs the activities the user initiates.
    C: Authentication verifies a username and password, and authorization handles the communication between the authentication agent and the user database.
    D: Authentication identifies a user who is attempting to access a system, and authorization validates the user's password.
  correct_answer: A
  explanation: Authentication verifies identity. Authorization determines what that authenticated user is permitted to do after access is granted.
  source: adapted_from_images

- id: SF-007
  topic: Security Fundamentals
  subtopic: SSH and ACLs
  type: single_choice
  difficulty: hard
  tags:
  - ssh
  - acl
  - extended-acl
  - access-group
  question: An engineer is configuring remote access to a router from IP subnet 10.139.58.0/28. The domain name, crypto keys, and SSH have been configured. Which configuration enables the traffic on the destination router?
  options:
    A: '`interface FastEthernet0/0` `ip address 10.122.49.1 255.255.255.252` `ip access-group 110 in` `ip access-list extended 110` `permit tcp 10.139.58.0 0.0.0.15 host 10.122.49.1 eq 22`'
    B: '`interface FastEthernet0/0` `ip address 10.122.49.1 255.255.255.240` `access-group 120 in` `ip access-list extended 120` `permit tcp 10.139.58.0 255.255.255.248 any eq 22`'
    C: '`interface FastEthernet0/0` `ip address 10.122.49.1 255.255.255.252` `ip access-group 105 in` `ip access-list standard 105` `permit tcp 10.139.58.0 0.0.0.7 eq 22 host 10.122.49.1`'
    D: '`interface FastEthernet0/0` `ip address 10.122.49.1 255.255.255.248` `ip access-group 10 in` `ip access-list standard 10` `permit udp 10.139.58.0 0.0.0.7 host 10.122.49.1 eq 22`'
  correct_answer: A
  explanation: SSH uses TCP port 22, and the destination router must permit inbound SSH from subnet 10.139.58.0/28 to the router interface address. An extended ACL is required to match protocol, source, destination, and port correctly.
  source: adapted_from_images

