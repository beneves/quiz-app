  question: Refer to the exhibit. An engineer booted a new switch and applied this configuration to the console port. Which additional configuration must be applied to allow administrators to authenticate directly to global configuration mode via Telnet using a local username and password?
  options:
    A: '`R1(config)#username admin` `R1(config-if)#line vty 0 4` `R1(config-line)#password p@ss1234` `R1(config-line)#transport input telnet`'
    B: '`R1(config)#username admin privilege 15 secret p@ss1234` `R1(config)#line vty 0 4` `R1(config-line)#login local`'
    C: '`R1(config)#username admin secret p@ss1234` `R1(config)#line vty 0 4` `R1(config-line)#login local` `R1(config-line)#enable secret p@ss1234`'
