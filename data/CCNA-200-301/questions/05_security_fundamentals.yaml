  question: Refer to the exhibit. A network administrator has been tasked with securing VTY access to a router. Which access-list entry accomplishes this task?
  options:
    A: '`access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq telnet`'
    B: '`access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq scp`'
    C: '`access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq https`'
    D: '`access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq ssh`'
  correct_answer: D
  explanation: To secure VTY access on a router, the ACL entry must permit SSH traffic from the allowed source network to the management destination network. SSH is the secure protocol for remote VTY access.
  source: adapted_from_images

- id: SF-085
  topic: Security Fundamentals
