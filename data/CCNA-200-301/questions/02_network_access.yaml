- id: NA-063
  topic: Network Access
  subtopic: Wireless Security
  type: single_choice
  difficulty: medium
  tags:
  - 802.11r
  - fast-transition
  - ft-psk
  - roaming
  question: Refer to the exhibit. Users need to connect to the wireless network with IEEE 802.11r-compatible devices. The connection must be maintained as users travel between floors or to other areas in the building. What must be the configuration of the connection?
  exhibit: 'Wireless roaming requirement:

    - client devices support IEEE 802.11r

    - connectivity must be maintained during movement between AP coverage areas

    - WLAN uses PSK-style authentication in this scenario


    Task:

    - enable the fast-roaming option that matches a PSK WLAN

    '
  options:
    A: Disable AES encryption.
    B: Enable Fast Transition and select the FT 802.1x option.
    C: Enable Fast Transition and select the FT PSK option.
    D: Select the WPA Policy option with the CCKM option.
  correct_answer: C
  explanation: For 802.11r roaming with a PSK-based WLAN, Fast Transition must be enabled together with the FT PSK option.
  source: 2-Network-Access_103/NA-063.png

- id: NA-064
  topic: Network Access
  subtopic: Switch Security
  type: single_choice
  difficulty: medium
  tags:
  - port-security
  - access-port
  - mac-address
  question: Refer to the exhibit. An engineer must configure the interface that connects to PC1 and secure it in a way that only PC1 is allowed to use the port. No VLAN tagging can be used except for a voice VLAN. Which command sequence must be entered to configure the switch?
  exhibit: 'Port-security requirement:

    - the PC1-facing interface must remain an access port

    - no VLAN tagging is allowed other than optional voice VLAN behavior

    - only PC1 is allowed to use the port


    Task:

    - choose the access-port configuration with port security bound to PC1''s MAC address

    '
  options:
    A: SW1(config-if)#switchport mode dynamic auto SW1(config-if)#switchport port-security SW1(config-if)#switchport port-security violation restrict
    B: SW1(config-if)#switchport mode nonegotiate SW1(config-if)#switchport port-security SW1(config-if)#switchport port-security maximum 1
    C: SW1(config-if)#switchport mode access SW1(config-if)#switchport port-security SW1(config-if)#switchport port-security mac-address 0050.7966.6800
    D: SW1(config-if)#switchport mode dynamic desirable SW1(config-if)#switchport port-security mac-address 0050.7966.6800 SW1(config-if)#switchport port-security mac-address sticky
  correct_answer: C
  explanation: Because the port must be a non-tagging access port and only PC1 is allowed, the correct solution is an access port with port security tied to PC1's specific MAC address.
  source: 2-Network-Access_103/NA-064.png

- id: NA-065
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: easy
  tags:
  - rapid-pvst
  - vlan
  - spanning-tree
  question: How does Rapid PVST+ create a fast loop-free network topology?
  options:
    A: It uses multiple active paths between end stations.
    B: It requires multiple links between core switches.
    C: It maps multiple VLANs into the same spanning-tree instance.
    D: It generates one spanning-tree instance for each VLAN.
  correct_answer: D
  explanation: Rapid PVST+ runs a separate spanning-tree instance per VLAN, allowing faster and VLAN-specific convergence.
