- id: NA-018
  topic: Network Access
  subtopic: Switching
  type: single_choice
  difficulty: easy
  tags:
  - switching
  - mac-address-table
  - flooding
  question: What does a switch do when it receives a frame whose destination MAC address is missing from the MAC address table?
  options:
    A: It changes the checksum of the frame to a value that indicates an invalid frame.
    B: It updates the CAM table with the destination MAC address of the frame.
    C: It appends the table with a static entry for the MAC and shuts down the port.
    D: It floods the frame unchanged across all remaining ports in the incoming VLAN.
  correct_answer: D
  explanation: For an unknown unicast destination, the switch floods the frame out all other ports in the same VLAN.
  source: adapted_from_images

- id: NA-019
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wireless
  - split-mac
  - ap
  - wlc
  question: Where are the real-time control functions processed in a split MAC architecture?
  options:
    A: central WLC
    B: individual AP
    C: client device
    D: centralized cloud management platform
  correct_answer: B
  explanation: In split MAC, time-sensitive real-time functions such as beacons and acknowledgments are handled by the AP, while the controller handles centralized management functions.
  source: adapted_from_images

- id: NA-020
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wireless
  - flexconnect
  - survivability
  question: A Cisco engineer at a new branch office is configuring a wireless network with access points that connect to a controller based at corporate headquarters. Wireless client traffic must terminate at the branch office and access-point survivability is required in the event of a WAN outage. Which access point mode must be selected?
  options:
    A: Lightweight with local switching disabled
    B: FlexConnect with local switching enabled
    C: OfficeExtend with high availability disabled
    D: Local with AP fallback enabled
  correct_answer: B
  explanation: FlexConnect with local switching allows branch traffic to stay local and supports continued operation if WAN connectivity to the controller is lost.
  source: adapted_from_images

- id: NA-021
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wlc
  - wlan
  - ssid
  - interface-group
  question: Refer to the exhibit. The My_WLAN wireless LAN was configured with WPA2 Layer 2 PSK security. Which additional configuration must the administrator perform to allow users to connect to this WLAN on a different subnet called Data?
  exhibit: 'WLAN configuration summary:

    - SSID My_WLAN already has WPA2 PSK security configured

    - users must be placed on a different subnet named Data


    Task:

    - enable the WLAN and map it to the correct interface/interface group for the Data subnet

    '
  options:
    A: Enable Status and set the NAS-ID to data
    B: Enable Status and enable Broadcast SSID
    C: Enable Status and select data from the Interface/Interface Group drop-down list
    D: Enable Broadcast SSID and select data from the Interface/Interface Group drop-down list
  correct_answer: C
  explanation: The WLAN must be enabled and mapped to the correct interface or interface group so client traffic lands in the Data subnet.
  source: 2-Network-Access_103/NA-021.png

- id: NA-022
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: easy
  tags:
  - wlc
  - wlan
  - client-limit
  question: Refer to the exhibit. A network engineer is configuring a WLAN to connect with the 172.16.10.0/24 network on VLAN 20. The engineer wants to limit the number of devices that connect to the WLAN on the USERWL SSID to 125. Which configuration must the engineer perform on the WLC?
  exhibit: 'WLAN requirement:

    - SSID USERWL maps to VLAN 20 / 172.16.10.0/24

    - maximum associated clients must be limited to 125


    Task:

    - choose the WLC setting that directly controls the per-WLAN client limit

    '
  options:
    A: In the Controller IPv6 configuration, set the Throttle value to 125.
    B: In the WLAN configuration, set the Maximum Allowed Clients value to 125.
    C: In the Management Software activation configuration, set the Clients value to 125.
    D: In the Advanced configuration, set the DTIM value to 125.
  correct_answer: B
  explanation: The WLC client limit for an SSID is controlled through the WLAN Maximum Allowed Clients setting.
  source: 2-Network-Access_103/NA-022.png

