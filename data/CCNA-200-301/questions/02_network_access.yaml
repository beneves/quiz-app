  exhibit: 'Trunking clue:

    - an untagged frame arrives on Gi0/1

    - the interface treats untagged traffic as belonging to the native VLAN


    Task:

    - identify the native VLAN configured in the exhibit

    '
  options:
    A: The frame is processed in VLAN 1
    B: The frame is processed in VLAN 11
    C: The frame is processed in VLAN 5
    D: The frame is dropped
  correct_answer: C
  explanation: On an 802.1Q trunk, untagged frames are associated with the native VLAN. In the exhibit, the native VLAN is VLAN 5.
