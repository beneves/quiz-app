- id: NA-060
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - autonomous-ap
  - cloud-based-ap
  - management
  question: What must a network administrator consider when deciding whether to configure a new wireless network with APs in autonomous mode or APs running in cloud-based mode?
  options:
    A: Autonomous mode APs are less dependent on an underlay but more complex to maintain than APs in cloud-based mode.
    B: Cloud-based mode APs rely on underlays and are more complex to maintain than APs in autonomous mode.
    C: Cloud-based mode APs are easy to deploy but harder to automate than APs in autonomous mode.
    D: Autonomous mode APs are easy to deploy and automate than APs in cloud-based mode.
  correct_answer: A
  explanation: Autonomous APs can operate more independently but require per-device configuration and maintenance, whereas cloud-managed APs are usually simpler to deploy and manage centrally.
  source: adapted_from_images

