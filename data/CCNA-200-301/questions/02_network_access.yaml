- id: NA-073
  topic: Network Access
  subtopic: Wireless Security
  type: single_choice
  difficulty: medium
  tags:
  - pmf
  - comeback-timer
  - spoofed-association
  question: An administrator must secure the WLC from receiving spoofed association requests. Which steps must be taken to configure the WLC to restrict the requests and force the user to wait 10 ms to retry an association request?
  options:
    A: Enable MAC filtering and set the SA Query timeout to 10.
    B: Enable 802.1x Layer 2 security and set the Comeback timer to 10.
    C: Enable Security Association Teardown Protection and set the SA Query timeout to 10.
    D: Enable the Protected Management Frame service and set the Comeback timer to 10.
  correct_answer: D
  explanation: Protected Management Frames help defend against spoofed management traffic, and the comeback timer controls how long a client waits before retrying association.
