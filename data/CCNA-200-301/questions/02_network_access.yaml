  question: Which port type supports the spanning-tree portfast command without additional configuration?
  options:
    A: Layer 3 main interfaces
    B: Layer 3 subinterfaces
    C: trunk ports
    D: access ports
  correct_answer: D
  explanation: PortFast is intended for edge access ports connected to end devices so they can move to forwarding immediately.
