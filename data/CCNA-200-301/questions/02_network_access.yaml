- id: NA-101
  topic: Network Access
  subtopic: Discovery Protocols
  type: single_choice
  difficulty: medium
  tags:
  - cdp
  - lldp
  - interfaces
  - neighbors
  question: 'Refer to the exhibit. For security reasons, automatic neighbor discovery must be disabled on the R5 Gi0/1 interface. These tasks must be completed: disable all neighbor discovery methods on R5 interface Gi0/1, permit neighbor discovery on R5 interface Gi0/2, verify there are no dynamically learned neighbors on R5 interface Gi0/1, and display the IP address of R6''s interface Gi0/2. Which configuration must be used?'
  exhibit: 'Security requirement on R5:

    - disable all automatic neighbor discovery only on Gi0/1

    - keep neighbor discovery available on Gi0/2


    Verification requirements:

    - confirm no dynamic neighbors are learned on Gi0/1

    - display neighbor detail that includes R6 Gi0/2 IP information

    '
  options:
    A: R5(config)#int Gi0/1 R5(config-if)#no cdp enable R5(config-if)#exit R5(config)#lldp run R5(config)#no cdp run R5#sh cdp neighbor detail R5#sh lldp neighbor
    B: R5(config)#int Gi0/1 R5(config-if)#no cdp enable R5(config-if)#exit R5(config)#no lldp run R5(config)#cdp run R5#sh cdp neighbor R5#sh lldp neighbor
    C: R5(config)#int Gi0/1 R5(config-if)#no cdp run R5(config-if)#exit R5(config)#lldp run R5(config)#cdp enable R5#sh cdp neighbor R5#sh lldp neighbor
    D: R5(config)#int Gi0/1 R5(config-if)#no cdp enable R5(config-if)#exit R5(config)#no lldp run R5(config)#cdp run R5#sh cdp neighbor detail R5#sh lldp neighbor
  correct_answer: D
  explanation: The solution must disable neighbor discovery on the sensitive interface while still allowing the required verification. The correct option preserves CDP where needed and uses detail output to display the neighbor IP address information.
  source: 2-Network-Access_103/NA-101.png

- id: NA-102
  topic: Network Access
  subtopic: VLANs
  type: single_choice
  difficulty: easy
  tags:
  - voice-vlan
  - access-port
  - ip-phone
  question: Refer to the exhibit. An administrator must configure interfaces Gi1/1 and Gi1/3 on switch SW11. PC-1 and PC-2 must be placed in the Data VLAN, and Phone-1 must be placed in the Voice VLAN. Which configuration meets these requirements?
  exhibit: 'Interface requirements on SW11:

    - Gi1/1 connects to PC-1 and should be in Data VLAN 8

    - Gi1/3 connects to Phone-1 with PC-2 behind it

    - Phone-1 should use Voice VLAN 9

    - PC-2 should stay in Data VLAN 8


    Task:

    - choose the access-port configuration with the correct voice VLAN on Gi1/3

    '
  options:
    A: interface gigabitethernet1/1 switchport mode access switchport access vlan 8 ! interface gigabitethernet1/3 switchport mode access switchport access vlan 8 switchport voice vlan 9
    B: interface gigabitethernet1/1 switchport mode access switchport access vlan 8 ! interface gigabitethernet1/3 switchport mode trunk switchport trunk vlan 8 switchport voice vlan 9
    C: interface gigabitethernet1/1 switchport mode access switchport access vlan 9 ! interface gigabitethernet1/3 switchport mode trunk switchport trunk vlan 8 switchport trunk vlan 9
    D: interface gigabitethernet1/1 switchport mode access switchport access vlan 8 ! interface gigabitethernet1/3 switchport mode access switchport voice vlan 8 switchport access vlan 9
  correct_answer: A
  explanation: The PC-only port should be an access port in the data VLAN, and the phone-plus-PC port should also be an access port in the data VLAN with a separate configured voice VLAN for the IP phone.
  source: 2-Network-Access_103/NA-102.png

