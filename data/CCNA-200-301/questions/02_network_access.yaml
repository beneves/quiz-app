  - link-aggregation
  - redundancy
  - bandwidth
  question: What provides connection redundancy, increased bandwidth, and load sharing between a wireless LAN controller and a Layer 2 switch?
  options:
    A: first hop redundancy
    B: VLAN trunking
    C: tunneling
    D: link aggregation
  correct_answer: D
  explanation: Link aggregation bundles multiple physical links into one logical connection to increase throughput and provide redundancy.
