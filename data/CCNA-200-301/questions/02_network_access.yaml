  - trunk
  question: Which type of port is used to connect to the wired network when an autonomous AP maps two VLANs to its WLANs?
  options:
    A: access
    B: LAG
    C: trunk
    D: EtherChannel
  correct_answer: C
  explanation: When an autonomous AP carries multiple VLANs for different WLANs, the switch-facing wired connection must be a trunk.
