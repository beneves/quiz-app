- id: NA-045
  topic: Network Access
  subtopic: VLANs
  type: single_choice
  difficulty: easy
  tags:
  - voice-vlan
  - access-port
  - ip-phone
  question: Refer to the exhibit. Network services must be enabled on interface Gi1/0/34. Which configuration meets the needs for this implementation?
  exhibit: 'Port requirement:

    - interface Gi1/0/34 connects to an IP phone and user device

    - data VLAN = 400

    - voice VLAN = 4041


    Task:

    - choose the correct access-port and voice-VLAN configuration

    '
  options:
    A: interface Gi1/0/34 switchport mode trunk switchport trunk allowed native vlan 400 switchport voice vlan 4041
    B: interface Gi1/0/34 switchport mode trunk switchport trunk allowed vlan 400,4041 switchport voice vlan 4041
    C: interface Gi1/0/34 switchport mode access switchport access vlan 400 switchport voice vlan 4041
    D: interface Gi1/0/34 switchport mode access switchport access vlan 4041 switchport voice vlan 400
  correct_answer: C
  explanation: A switch port connected to an IP phone with a user PC typically remains an access port in the data VLAN and adds a separate voice VLAN with `switchport voice vlan`.
