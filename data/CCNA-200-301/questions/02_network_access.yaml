- id: NA-001
  topic: Network Access
  subtopic: VLAN Trunking
  type: single_choice
  difficulty: medium
  tags:
  - vlan
  - trunk
  - allowed-vlan
  question: Refer to the exhibit. A network engineer must configure communication between PC A and the file server. Which command must be configured on switch A to prevent interruption of other communications?
  exhibit: 'VLAN/trunk task:

    - current trunk already carries existing VLAN traffic

    - PC A and the file server need VLAN 13 added across the trunk


    Requirement:

    - allow VLAN 13

    - do not remove existing allowed VLANs

    '
  options:
    A: switchport trunk allowed vlan 12
    B: switchport trunk allowed vlan none
    C: switchport trunk allowed vlan add 13
    D: switchport trunk allowed vlan remove 10-11
  correct_answer: C
  explanation: VLAN 13 must be allowed across the trunk while preserving the existing permitted VLANs.
  source: 2-Network-Access_103/NA-001.png

- id: NA-002
  topic: Network Access
  subtopic: Voice VLAN
  type: single_choice
  difficulty: easy
  tags:
  - voice-vlan
  - access-port
  - switchport
  question: Refer to the exhibit. An engineer must configure GigabitEthernet1/1 to accommodate voice and data traffic. Which configuration accomplishes this task?
  exhibit: 'Access-port voice/data requirement:

    - user data VLAN = 300

    - voice VLAN = 400


    Task:

    - configure the switchport for a phone with an attached PC

    '
  options:
    A: interface gigabitethernet1/1 switchport mode access switchport access vlan 300 switchport voice vlan 400
    B: interface gigabitethernet1/1 switchport mode trunk switchport trunk vlan 300 switchport trunk vlan 400
    C: interface gigabitethernet1/1 switchport mode access switchport voice vlan 300 switchport access vlan 400
    D: interface gigabitethernet1/1 switchport mode trunk switchport trunk vlan 300 switchport voice vlan 400
  correct_answer: A
  explanation: A phone with an attached PC normally uses an access port with one data VLAN and one voice VLAN.
  source: 2-Network-Access_103/NA-002.png

- id: NA-003
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: medium
  tags:
  - stp
  - root-bridge
  - bridge-id
  question: Refer to the exhibit. Which switch in this configuration will be elected as the root bridge?
  exhibit: 'STP election criteria shown in the exhibit:

    - compare switch priority first

    - if priorities tie, compare MAC address


    Key clue:

    - SW3 and SW4 have the lowest bridge priority

    - SW3 has the lower MAC address of the tied pair

    '
  options:
    A: SW1
    B: SW2
    C: SW3
    D: SW4
  correct_answer: C
  explanation: SW3 and SW4 have the lowest STP priority, and SW3 wins the tie because it has the lower MAC address.
  source: 2-Network-Access_103/NA-003.png

- id: NA-004
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wlc
  - ise
  - aaa-override
  question: After installing a new Cisco ISE server, which task must the engineer perform on the Cisco WLC to connect wireless clients on a specific VLAN based on their credentials?
  options:
    A: Disable the LAG Mode on Next Reboot.
    B: Enable the Event Driven RRM.
    C: Enable the Allow AAA Override.
    D: Enable the Authorize MIC APs against auth-list or AAA.
  correct_answer: C
  explanation: AAA Override allows ISE to return per-user attributes such as VLAN assignment.
  source: adapted_from_images

- id: NA-005
  topic: Network Access
  subtopic: STP
  type: multiple_choice
  difficulty: easy
  tags:
  - stp
  - portfast
  question: Which two spanning-tree states are bypassed on an interface running PortFast? (Choose two.)
  options:
    A: disabled
    B: listening
    C: learning
    D: blocking
    E: forwarding
  correct_answer:
  - B
  - C
  explanation: PortFast skips the listening and learning states so an access port can move to forwarding immediately.
  source: adapted_from_images

- id: NA-006
  topic: Network Access
  subtopic: Simulation Lab
  type: simulation_lab
  difficulty: hard
  tags:
  - simulation
  - lab
  - interactive
  question: Simulation lab. Review the exhibit image and complete the required configuration or verification tasks.
  exhibit: Open the exhibit image for the full topology, task list, and any answer-reference text captured from the source screenshots.
  explanation: This simulation lab was converted from the source screenshots. Review the exhibit image, enter the IOS commands needed for the task, and submit the lab after completing the workflow. This lab now validates the key configuration flow shown in the exhibit.
  source: 2-Network-Access_103/NA-006.png
  lab:
    intro: This lab is driven by the original simulation screenshots. Use the exhibit image as the task sheet and enter the commands you would use on the simulated devices.
    objectives:
    - Create VLAN 35 named SALES on SW1.
    - Create VLAN 39 named MARKETING on SW2.
    - Configure the PC-facing interfaces as access ports in the correct VLANs.
    - Enable LLDP globally on both switches and disable LLDP transmit/receive on the SW1 interface connected to PC1.
    - Verify the final switch configuration before submitting.
    initial_prompt: SW1#
    image: 2-Network-Access_103/NA-006.png
    required_commands:
    - configure terminal
    - vlan 35
    - name sales
    - vlan 39
    - name marketing
    - interface e0/2
    - switchport mode access
    - switchport access vlan 35
    - lldp run
    - no lldp transmit
    - no lldp receive
    - end
    verification_commands:
    - show vlan brief
    - show lldp neighbors
    command_responses:
      show vlan brief: Confirm VLAN 35 SALES and VLAN 39 MARKETING exist and the PC-facing ports are assigned to the expected access VLANs.
      show lldp neighbors: Confirm LLDP is enabled where required and disabled on the SW1 PC1-facing interface.

- id: NA-007
  topic: Network Access
  subtopic: EtherChannel
  type: single_choice
  difficulty: medium
  tags:
  - etherchannel
  - lacp
  - pagp
  question: Refer to the exhibit. A network engineer updates the existing configuration on interface FastEthernet1/1 of switch SW1. It must establish an EtherChannel by using the same group designation with another vendor switch. Which configuration must be performed to complete the process?
  exhibit: 'EtherChannel requirement:

    - peer device is from another vendor

    - channel group must remain 2


    Task:

    - choose the protocol/mode that supports multivendor EtherChannel negotiation

    '
  options:
    A: interface port-channel 2 channel-group 2 mode desirable
    B: interface fastethernet 1/1 channel-group 2 mode on
    C: interface fastethernet 1/1 channel-group 2 mode active
    D: interface port-channel 2 channel-group 2 mode auto
  correct_answer: C
  explanation: LACP must be used with a non-Cisco peer, and active mode initiates LACP negotiation.
  source: 2-Network-Access_103/NA-007.png

- id: NA-008
  topic: Network Access
  subtopic: Wireless
  type: multiple_choice
  difficulty: easy
  tags:
  - wlc
  - wlan
  - ssid
  question: Which two values or settings must be entered when configuring a new WLAN in the Cisco Wireless LAN Controller GUI? (Choose two.)
  options:
    A: QoS settings
    B: IP address of one or more access points
    C: SSID
    D: profile name
    E: management interface settings
  correct_answer:
  - C
  - D
