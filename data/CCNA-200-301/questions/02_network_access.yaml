- id: NA-081
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: medium
  tags:
  - stp
  - root-bridge
  - bridge-id
  - mac-address
  question: Refer to the exhibit. Which switch in this configuration will be elected as the root bridge?
  exhibit: 'STP root election task:

    - compare bridge priorities first

    - if there is a tie, compare MAC addresses


    Key clue from the exhibit:

    - SW2 and SW3 share the lowest priority

    - SW3 has the lower MAC address of the tied pair

    '
  options:
    A: SW1
    B: SW2
    C: SW3
    D: SW4
  correct_answer: C
  explanation: SW2 and SW3 share the lowest STP priority of 8192, so the MAC-address tiebreaker applies. SW3 has the lower MAC address and becomes the root bridge.
  source: 2-Network-Access_103/NA-081.png

- id: NA-082
  topic: Network Access
  subtopic: VLANs
  type: single_choice
  difficulty: medium
  tags:
  - access-port
  - trunk
  - mac-address-table
  - switching
  question: Refer to the exhibit. An engineer has started to configure replacement switch SW1. To verify part of the configuration, the engineer issued the commands as shown and noticed that the entry for PC2 is missing. Which change must be applied to SW1 so that PC1 and PC2 communicate normally?
  exhibit: 'Troubleshooting clue:

    - PC2 MAC entry is missing from SW1

    - the PC2-facing port is misconfigured as a trunk

    - PC2 should be attached to a normal access port


    Task:

    - return the PC-facing interface to the correct access-port behavior

    '
  options:
    A: SW1(config)#interface fa0/2 SW1(config-if)#no switchport access vlan 2 SW1(config-if)#no switchport trunk allowed vlan 3 SW1(config-if)#switchport trunk allowed vlan 2
    B: SW1(config)#interface fa0/1 SW1(config-if)#no switchport access vlan 2 SW1(config-if)#switchport trunk native vlan 2 SW1(config-if)#switchport trunk allowed vlan 3
    C: SW1(config)#interface fa0/2 SW1(config-if)#no switchport mode trunk SW1(config-if)#no switchport trunk allowed vlan 3 SW1(config-if)#switchport mode access
    D: SW1(config)#interface fa0/1 SW1(config-if)#no switchport access vlan 2 SW1(config-if)#switchport access vlan 3 SW1(config-if)#switchport trunk allowed vlan 2
  correct_answer: C
  explanation: PC2 is on Fa0/2 but that port is incorrectly configured as a trunk allowing VLAN 3. It must be returned to an access port in VLAN 2 so both PCs can communicate normally.
  source: 2-Network-Access_103/NA-082.png

- id: NA-083
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: easy
  tags:
  - stp
  - root-port
  - switching
  question: What is the role of the root port in a switched network?
  options:
    A: It replaces the designated port when the designated port fails.
    B: It replaces the designated port when the root port fails.
    C: It is the best path to the root from a nonroot switch.
    D: It is administratively disabled until a failover occurs.
  correct_answer: C
  explanation: On each nonroot switch, the root port is the port with the lowest-cost path toward the root bridge.
  source: adapted_from_images

