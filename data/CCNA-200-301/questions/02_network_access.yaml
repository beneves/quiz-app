- id: NA-076
  topic: Network Access
  subtopic: VLANs
  type: single_choice
  difficulty: medium
  tags:
  - trunk
  - access-port
  - vlan
  - switching
  question: Refer to the exhibit. Switch AccSw1 has just been added to the network along with PC2. All VLANs have been implemented on AccSw2. How must the ports on AccSw2 be configured to establish Layer 2 connectivity between PC1 and PC2?
  exhibit: 'Topology requirement:

    - PC2 is newly connected to AccSw1

    - PC1 and PC2 must communicate at Layer 2

    - VLANs already exist on AccSw2


    Task on AccSw2:

    - configure the PC-facing port as an access port in the correct VLAN

    - configure the inter-switch link as a trunk

    '
  options:
    A: interface GigabitEthernet1/2 switchport mode access switchport access vlan 2 ! interface GigabitEthernet1/24 switchport mode trunk
    B: interface GigabitEthernet1/1 switchport mode access switchport access vlan 11 ! interface GigabitEthernet1/24 switchport mode trunk
    C: interface GigabitEthernet1/24 switchport mode trunk switchport trunk allowed vlan 11, 12 ! interface GigabitEthernet1/1 switchport access vlan 11
    D: interface GigabitEthernet1/2 switchport mode access switchport access vlan 12 ! interface GigabitEthernet1/24 switchport trunk allowed vlan 11, 12
  correct_answer: B
  explanation: PC2 connects on Gi1/1 in VLAN 11, and the inter-switch link on Gi1/24 must be configured as a trunk so VLAN 11 can traverse between the switches.
  source: 2-Network-Access_103/NA-076.png

- id: NA-077
  topic: Network Access
  subtopic: EtherChannel
  type: single_choice
  difficulty: easy
  tags:
  - lacp
  - active
  - passive
  - etherchannel
  question: Refer to the exhibit. An engineer is configuring an EtherChannel using LACP between Switches 1 and 2. Which configuration must be applied so that only Switch 1 sends LACP initiation packets?
  exhibit: 'LACP requirement:

    - only Switch 1 should initiate LACP negotiation

    - Switch 2 should only respond


    Task:

    - choose the active/passive combination that matches that behavior

    '
  options:
    A: 'Switch1(config-if)#channel-group 1 mode on

      Switch2(config-if)#channel-group 1 mode active'
    B: 'Switch1(config-if)#channel-group 1 mode active

      Switch2(config-if)#channel-group 1 mode passive'
    C: 'Switch1(config-if)#channel-group 1 mode passive

      Switch2(config-if)#channel-group 1 mode active'
    D: 'Switch1(config-if)#channel-group 1 mode on

      Switch2(config-if)#channel-group 1 mode passive'
  correct_answer: B
  explanation: In LACP, the active side initiates negotiation packets and the passive side only responds, so Switch 1 must be active and Switch 2 passive.
  source: 2-Network-Access_103/NA-077.png

- id: NA-078
  topic: Network Access
