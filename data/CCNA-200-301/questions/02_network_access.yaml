  question: 'A wireless access point is needed and must meet these requirements: zero-touch deployed and managed by a WLC, process only real-time MAC functionality, and be used in a split-MAC architecture. Which access point type must be used?'
  options:
    A: mesh
    B: autonomous
    C: lightweight
