- id: NA-067
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: medium
  tags:
  - stp
  - root-bridge
  - bridge-id
  - mac-address
  question: Refer to the exhibit. Which switch in this configuration will be elected as the root bridge?
  exhibit: 'STP election task:

    - choose the switch with the lowest bridge priority

    - if there is a tie, choose the lowest MAC address


    Key clue from the exhibit:

    - SW1 and SW4 share the lowest priority

    - SW1 has the lower MAC address of the tied pair

    '
  options:
    A: SW1
    B: SW2
    C: SW3
    D: SW4
  correct_answer: A
  explanation: SW1 and SW4 share the lowest STP priority of 8192, so the tie is broken by the lower MAC address. SW1 has the lower MAC address and becomes root.
  source: 2-Network-Access_103/NA-067.png

