- id: NA-035
  topic: Network Access
  subtopic: Switching
  type: single_choice
  difficulty: easy
  tags:
  - switching
  - unknown-unicast
  - flooding
  question: When a switch receives a frame for an unknown destination MAC address, how is the frame handled?
  options:
    A: flooded to all ports except the origination port
    B: forwarded to the first available port
    C: broadcast to all ports on the switch
    D: inspected and dropped by the switch
  correct_answer: A
  explanation: When the destination MAC is unknown, the switch floods the frame out all other forwarding ports in the same VLAN except the port on which it was received.
  source: adapted_from_images

- id: NA-036
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: medium
  tags:
  - stp
  - root-bridge
  - bridge-id
  question: Refer to the exhibit. Which switch in this configuration will be elected as the root bridge?
  exhibit: 'STP root election task:

    - choose the switch with the lowest bridge priority

    - if priorities tie, choose the lowest MAC address


    Key clue from the exhibit:

    - SW2 and SW3 share the lowest priority

    - SW3 has the lower MAC address of the tied pair

    '
  options:
    A: SW1
    B: SW2
    C: SW3
    D: SW4
  correct_answer: C
  explanation: SW2 and SW3 share the lowest priority of 4096, and SW3 wins because it has the lower MAC address.
  source: 2-Network-Access_103/NA-036.png

- id: NA-037
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: medium
  tags:
  - stp
