- id: NA-093
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: medium
  tags:
  - portfast
  - bpdu
  - broadcast-storm
  question: What occurs when PortFast is enabled on an interface that is connected to another switch?
  options:
    A: Root port choice and spanning-tree recalculation are accelerated when a switch link goes down.
    B: After spanning-tree converges, PortFast shuts down any port that receives BPDUs.
    C: VTP is allowed to propagate VLAN configuration information from switch to switch automatically.
    D: Spanning-tree fails to detect a switching loop, increasing the likelihood of broadcast storms.
  correct_answer: D
  explanation: PortFast should not be used on links between switches because bypassing normal STP transition can hide loops and lead to broadcast storms.
  source: adapted_from_images

