  question: A network architect planning a new Wi-Fi network must decide between autonomous, cloud-based, and split MAC architectures. Which two facts should the architect consider? (Choose two.)
  options:
    A: Cloud-based architectures uniquely use the CAPWAP protocol to communicate between access points and clients.
    B: Autonomous architectures exclusively use tunneling protocols to manage access points remotely.
    C: All three architectures use access points to manage the wireless devices connected to the wired infrastructure.
    D: Lightweight access points are solely used by split MAC architectures.
    E: Each of the three architectures must use WLCs to manage their access points.
  correct_answer:
  - C
  - D
  explanation: All three designs still rely on APs to connect wireless clients to the wired network, and lightweight APs are characteristic of split-MAC architectures.
