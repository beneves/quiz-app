- id: NA-009
  topic: Network Access
  subtopic: LLDP
  type: single_choice
  difficulty: medium
  tags:
  - lldp
  - timer
  - holdtime
  question: Refer to the exhibit. A network engineer must update the configuration on Switch2 so that it sends LLDP packets every minute and the information sent via LLDP is refreshed every 3 minutes. Which configuration must the engineer apply?
  exhibit: 'LLDP timer requirement:

    - send LLDP packets every 60 seconds

    - refresh/retain LLDP information for 180 seconds


    Task:

    - choose the correct `lldp timer` and `lldp holdtime` configuration

    '
  options:
    A: Switch2(config)#lldp timer 60 Switch2(config)#lldp tlv-select 180
    B: Switch2(config)#lldp timer 60 Switch2(config)#lldp holdtime 180
    C: Switch2(config)#lldp timer 1 Switch2(config)#lldp holdtime 3
    D: Switch2(config)#lldp timer 1 Switch2(config)#lldp tlv-select 3
  correct_answer: B
  explanation: The LLDP transmit interval is configured with `lldp timer`, and the refresh/retention value is set with `lldp holdtime`.
  source: 2-Network-Access_103/NA-009.png

- id: NA-010
  topic: Network Access
  subtopic: EtherChannel
  type: single_choice
  difficulty: medium
  tags:
  - etherchannel
  - lacp
  - layer2
  question: Refer to the exhibit. Which configuration establishes a Layer 2 LACP EtherChannel when applied to both switches?
  exhibit: 'EtherChannel requirement:

    - Layer 2 EtherChannel

    - LACP must be used

    - configuration is applied on both switches


    Task:

    - choose the option that uses compatible switchport settings and LACP mode

    '
  options:
    A: interface range G1/1 - 1/3 switchport mode trunk channel-group 1 mode active no shutdown
    B: interface range G1/1 - 1/3 switchport mode access channel-group 1 mode passive no shutdown
    C: interface range G1/1 - 1/3 switchport mode trunk channel-group 1 mode desirable no shutdown
    D: interface range G1/1 - 1/3 switchport mode access channel-group 1 mode on no shutdown
  correct_answer: A
  explanation: LACP uses active/passive, and the ports must be configured compatibly as a Layer 2 trunk EtherChannel.
  source: 2-Network-Access_103/NA-010.png

- id: NA-011
  topic: Network Access
  subtopic: Trunking
  type: single_choice
  difficulty: medium
  tags:
  - trunk
  - native-vlan
  - dot1q
  question: Refer to the exhibit. An engineer configures interface Fa0/1 on SW1 and SW2 to pass traffic from two different VLANs. For security reasons, company policy requires the native VLAN to be set to a nondefault value. Which configuration meets this requirement?
  exhibit: 'Trunking requirement:

    - carry VLANs 100 and 105 between SW1 and SW2

    - use 802.1Q trunking

    - native VLAN must be changed from the default value


    Task:

    - choose the secure trunk configuration

    '
  options:
    A: Switch(config-if)#switchport mode trunk Switch(config-if)#switchport trunk encapsulation dot1q Switch(config-if)#switchport trunk allowed vlan 100,105 Switch(config-if)#switchport trunk native vlan 3
    B: Switch(config-if)#switchport mode trunk Switch(config-if)#switchport trunk encapsulation isl Switch(config-if)#switchport trunk allowed vlan 100,105 Switch(config-if)#switchport trunk native vlan 1
    C: Switch(config-if)#switchport mode dynamic Switch(config-if)#switchport access vlan 100,105 Switch(config-if)#switchport trunk native vlan 1
    D: Switch(config-if)#switchport mode access Switch(config-if)#switchport trunk encapsulation dot1q Switch(config-if)#switchport access vlan 100,105 Switch(config-if)#switchport trunk native vlan 3
  correct_answer: A
  explanation: A proper trunk uses 802.1Q, permits the required VLANs, and sets the native VLAN to a nondefault value.
  source: 2-Network-Access_103/NA-011.png

- id: NA-012
  topic: Network Access
  subtopic: Trunking
  type: single_choice
  difficulty: medium
  tags:
  - trunk
  - dot1q
  - allowed-vlan
  question: 'Two switches have been implemented and all interfaces are at the default configuration level. A trunk link must be implemented between the switches with these requirements: using an industry-standard trunking protocol and permitting VLANs 1-10 while denying other VLANs. How must the interconnecting ports be configured?'
  options:
    A: 'switchport mode dynamic

      channel-protocol lacp

      switchport trunk allowed vlans 1-10'
    B: 'switchport mode trunk

      switchport trunk allowed vlans 1-10

      switchport trunk native vlan 11'
    C: 'switchport mode trunk

      switchport trunk encapsulation dot1q

      switchport trunk allowed vlans 1-10'
    D: 'switchport mode dynamic desirable

      channel-group 1 mode desirable

      switchport trunk encapsulation isl

      switchport trunk allowed vlan except 11-4094'
  correct_answer: C
  explanation: 802.1Q is the industry-standard trunking protocol, and the trunk must explicitly allow only VLANs 1 through 10.
  source: adapted_from_images

- id: NA-013
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wireless
  - flexconnect
  - local-mode
  - capwap
  question: What is a difference between local AP mode and FlexConnect AP mode?
  options:
    A: Local AP mode creates two CAPWAP tunnels per AP to the WLC.
    B: Local AP mode causes the AP to behave as if it were an autonomous AP.
    C: FlexConnect AP mode fails to function if the AP loses connectivity with the WLC.
    D: FlexConnect AP mode bridges the traffic from the AP to the WLC when local switching is configured.
  correct_answer: A
  explanation: In local mode, the AP uses CAPWAP tunnels back to the controller for centralized operation. FlexConnect is designed to support local switching at the remote site.
  source: adapted_from_images

