- id: NA-015
  topic: Network Access
  subtopic: VLAN Trunking
  type: single_choice
  difficulty: easy
  tags:
  - vlan
  - tagging
  - dot1q
  question: Which Layer 2 switch function encapsulates packets for different VLANs so that the packets traverse the same port and maintain traffic separation between the VLANs?
  options:
    A: VLAN marking
    B: VLAN numbering
    C: VLAN DSCP
    D: VLAN tagging
  correct_answer: D
  explanation: 802.1Q tagging adds VLAN information so multiple VLANs can cross the same trunk link while staying logically separated.
  source: adapted_from_images

- id: NA-016
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wireless
  - flexconnect
  - local-switching
  question: Refer to the exhibit. An architect is managing a wireless network with APs from several branch offices connecting to the WLC in the data center. There is a new requirement for a single WLAN to process the client data traffic without sending it to the WLC. Which action must be taken to complete the request?
  exhibit: 'Branch wireless requirement:

    - APs at remote branches join a centralized WLC

    - one WLAN must switch client traffic locally at the branch

    - client data should not be tunneled back to the controller


    Task:

    - choose the WLC/AP feature that enables local branch switching

    '
  options:
    A: Enable local HTTP profiling.
    B: Enable FlexConnect Local Switching.
    C: Enable local DHCP Profiling.
    D: Enable Disassociation Imminent.
  correct_answer: B
  explanation: FlexConnect local switching allows client traffic for a WLAN to be switched locally at the branch AP instead of being tunneled to the controller.
  source: 2-Network-Access_103/NA-016.png

