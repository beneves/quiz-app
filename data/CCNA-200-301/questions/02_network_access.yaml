- id: NA-029
  topic: Network Access
  subtopic: Wireless Security
  type: single_choice
  difficulty: medium
  tags:
  - wlc
  - wpa2
  - psk
  - pmf
  question: Refer to the exhibit. The network engineer is configuring a new WLAN and is told to use a setup password for authentication instead of the RADIUS servers. Which additional set of tasks must the engineer perform to complete the configuration?
  exhibit: 'WLAN security requirement:

    - use a shared setup password instead of RADIUS

    - this means PSK-based authentication is required


    Task:

    - choose the additional WLC security settings needed to finish the WLAN configuration

    '
  options:
    A: Enable WPA2 Policy and configure an ASCII PSK.
    B: Enable 802.1X and configure a RADIUS authentication server.
    C: Enable MAC filtering and disable WPA2 Policy.
    D: Configure WPA3 Enterprise and PMF required.
  correct_answer: A
  explanation: A setup password on a WLAN implies PSK authentication, so WPA2 PSK must be enabled and the shared key configured.
  source: 2-Network-Access_103/NA-029.png

- id: NA-030
  topic: Network Access
  subtopic: Discovery Protocols
  type: single_choice
  difficulty: medium
  tags:
  - cdp
  - lldp
  - discovery
  - interface
  question: Refer to the exhibit. Routers R1, R2, and R3 use a protocol to identify the neighbors' IP addresses, hardware platforms, and software versions. A network engineer must configure R2 to avoid sharing any neighbor information with R3 and maintain its relationship with R1. What action meets the requirement?
  exhibit: 'Discovery-protocol task:

    - R2 must stop sharing neighbor details with R3 only

    - R2 must continue exchanging discovery information with R1


    Task:

    - disable the protocol only on the interface facing R3

    '
  options:
    A: Disable the protocol globally on R2.
    B: Disable the protocol on the interface connected to R3.
    C: Change the protocol timer on R2.
    D: Disable the protocol on the interface connected to R1.
  correct_answer: B
  explanation: To preserve the neighbor relationship with R1, the discovery protocol should remain enabled globally and be disabled only on the interface facing R3.
  source: 2-Network-Access_103/NA-030.png

- id: NA-031
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: easy
  tags:
  - wireless
  - lightweight-ap
  - capwap
  question: How is a configuration change made to a wireless AP in lightweight mode?
  options:
    A: SSH connection to the management IP of the AP
    B: CAPWAP/LWAPP connection via the parent WLC
    C: EoIP connection via the parent WLC
    D: HTTPS connection directly to the out-of-band address of the AP
  correct_answer: B
  explanation: Lightweight APs are centrally managed through the controller over CAPWAP (or LWAPP on older platforms).
  source: adapted_from_images

- id: NA-032
  topic: Network Access
  subtopic: Discovery Protocols
  type: single_choice
  difficulty: medium
  tags:
  - cdp
  - interface
  - subnetting
  - cisco-cli
  question: Refer to the exhibit. An administrator must turn off the Cisco Discovery Protocol on the port configured with the last usable address in the 10.0.0.252/30 subnet. Which command set meets the requirement?
  exhibit: 'Subnetting clue:

    - subnet is 10.0.0.252/30

    - usable host addresses are 10.0.0.253 and 10.0.0.254

    - the last usable address is 10.0.0.254


    Task:

    - identify the interface using that address

    - disable CDP only on that interface

    '
  options:
    A: interface ... no cdp enable on the interface with 10.0.0.253
    B: interface ... no cdp enable on the interface with 10.0.0.254
    C: no cdp run globally
    D: cdp timer 0
  correct_answer: B
  explanation: A /30 subnet has two usable host addresses. In 10.0.0.252/30, the last usable address is 10.0.0.254, so CDP must be disabled on the interface configured with that address.
  source: 2-Network-Access_103/NA-032.png

- id: NA-033
  topic: Network Access
  subtopic: Wireless
  type: single_choice
  difficulty: medium
  tags:
  - wireless
  - flexconnect
  - branch-office
  question: Under what condition would a FlexConnect wireless architecture be preferable over other architectural choices?
  options:
    A: when the connection latency to several remote offices is anticipated to surpass 300 milliseconds
    B: when there is a need for high-precision location-based services at various remote offices
    C: when centralized management is needed for several remote offices that lack individual WLCs
    D: when each remote office necessitates its own local WLC for network management
  correct_answer: C
  explanation: FlexConnect is a strong fit for branch offices that need centralized control from a main WLC without deploying a dedicated controller at each site.
  source: adapted_from_images

