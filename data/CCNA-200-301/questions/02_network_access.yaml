- id: NA-074
  topic: Network Access
  subtopic: Wireless Architecture
  type: single_choice
  difficulty: medium
  tags:
  - split-mac
  - wlc
  - ap
  question: What does the term 'split MAC' refer to in a wireless architecture?
  options:
    A: leverages two APs to handle control and data traffic
    B: uses different MAC addresses for 2.4 GHz and 5 GHz bands on the same AP
    C: divides data link layer functions between the AP and WLC
    D: combines the management and control functions from the data-forwarding functions
  correct_answer: C
  explanation: In split-MAC architecture, some Layer 2 functions stay on the AP while higher-level control functions are centralized on the WLC.
