  - bridge-id
  question: Refer to the exhibit. Which switch in this configuration will be elected as the root bridge?
  exhibit: 'STP root election task:

    - compare bridge priorities first

    - no MAC-address tiebreak is needed if one switch has the lowest priority alone


    Key clue:

    - SW2 has the lowest priority value shown in the exhibit

    '
  options:
    A: SW1
    B: SW2
    C: SW3
    D: SW4
  correct_answer: B
  explanation: SW2 has the lowest STP priority value of 4096, so it becomes the root bridge without needing a MAC-address tie break.
  source: 2-Network-Access_103/NA-037.png

