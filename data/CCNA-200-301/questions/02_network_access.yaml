- id: NA-039
  topic: Network Access
  subtopic: EtherChannel
  type: single_choice
  difficulty: easy
  tags:
  - etherchannel
  - lacp
  - passive
  - active
  question: Refer to the exhibit. Which change to the configuration on Switch2 allows the two switches to establish an EtherChannel?
  exhibit: 'EtherChannel formation clue:

    - the switches are using LACP

    - the current modes do not successfully negotiate the bundle


    Task:

    - choose the change on Switch2 that allows the LACP EtherChannel to form

    '
  options:
    A: Change the LACP mode to desirable.
    B: Change the protocol to PAgP and use auto mode.
    C: Change the LACP mode to active.
    D: Change the protocol to EtherChannel mode on.
  correct_answer: C
  explanation: LACP forms a channel when at least one side is in active mode. With both sides set to passive, the EtherChannel does not form.
  source: 2-Network-Access_103/NA-039.png

- id: NA-040
  topic: Network Access
  subtopic: VLANs
  type: single_choice
  difficulty: easy
  tags:
  - voice-vlan
  - data-vlan
  - access-port
  question: Refer to the exhibit. All VLANs are present in the VLAN database. Which command sequence must be applied to complete the configuration?
  exhibit: 'Interface requirement:

    - connect an IP phone and a user device on the same switchport

    - use one data VLAN and one voice VLAN

    - all VLANs already exist in the database


    Task:

    - choose the proper access-port configuration with a voice VLAN

    '
  options:
    A: interface FastEthernet0/1 switchport mode access switchport voice vlan 10
    B: interface FastEthernet0/1 switchport trunk native vlan 10 switchport trunk allowed vlan 10,15
    C: interface FastEthernet0/1 switchport trunk allowed vlan add 10 vlan 10 private-vlan isolated
    D: interface FastEthernet0/1 switchport mode trunk switchport trunk allowed vlan 10,15
  correct_answer: A
  explanation: An IP phone with a PC behind it normally uses an access port for the data VLAN and a separate voice VLAN configured with `switchport voice vlan`.
  source: 2-Network-Access_103/NA-040.png

- id: NA-041
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: easy
  tags:
  - stp
