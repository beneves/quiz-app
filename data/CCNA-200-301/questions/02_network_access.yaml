  - portfast
  - server
  question: Which Rapid PVST+ feature should be configured on a switch port to immediately send traffic to a connected server as soon as it is active?
  options:
    A: portfast
    B: uplinkfast
    C: BPDU guard
    D: loop guard
  correct_answer: A
  explanation: PortFast lets an edge port transition to forwarding immediately, which is appropriate for a server-facing access port.
