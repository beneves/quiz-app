- id: NA-024
  topic: Network Access
  subtopic: Security
  type: single_choice
  difficulty: medium
  tags:
  - aaa
  - tacacs-plus
  - radius
  question: What is a difference between RADIUS and TACACS+?
  options:
    A: RADIUS logs all commands that are entered by the administrator, but TACACS+ logs only start, stop, and interim commands.
    B: TACACS+ separates authentication and authorization, and RADIUS merges them.
    C: TACACS+ encrypts only password information, and RADIUS encrypts the entire payload.
    D: RADIUS is most appropriate for dual authentication, but TACACS+ is also used for multiple types of authentication.
  correct_answer: B
  explanation: TACACS+ separates AAA functions more cleanly, while RADIUS combines authentication and authorization.
  source: adapted_from_images

