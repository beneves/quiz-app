  - portfast
  - errdisable
  question: Refer to the exhibit. What is the result if Gig1/11 receives an STP BPDU?
  exhibit: 'Interface protection clue:

    - Gig1/11 is configured as an edge/PortFast-style access port

    - BPDU Guard is enabled on the port


    Task:

    - determine what happens if the port receives a BPDU

    '
  options:
    A: The port transitions to STP blocking.
    B: The port immediately transitions to STP forwarding.
    C: The port goes into error-disable state.
    D: The port transitions to the root port.
  correct_answer: C
  explanation: A PortFast access port with BPDU Guard enabled is placed into err-disabled state if it receives a BPDU.
