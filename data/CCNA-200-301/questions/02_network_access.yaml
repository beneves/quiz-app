- id: NA-046
  topic: Network Access
  subtopic: Wireless
  type: multiple_choice
  difficulty: medium
  tags:
  - wlc
  - session-timeout
  - maximum-clients
  - wlan
  question: Refer to the exhibit. A network engineer configures the CCNA WLAN so that clients must reauthenticate hourly and to limit the number of simultaneous connections to the WLAN to 10. Which two actions complete this configuration? (Choose two.)
  exhibit: 'WLAN policy requirements:

    - clients must reauthenticate every hour

    - total simultaneous clients on the WLAN must be limited to 10


    Task:

    - configure the session timeout in seconds

    - configure the WLAN-wide maximum client count

    '
  options:
    A: Enable the Wi-Fi Direct Clients Policy option.
    B: Enable the Enable Session Timeout option and set the value to 3600.
    C: Enable the Client Exclusion option and set the value to 3600.
    D: Set the Maximum Allowed Clients value to 10.
    E: Set the Maximum Allowed Clients Per AP Radio value to 10.
  correct_answer:
  - B
  - D
  explanation: Hourly reauthentication uses a session timeout of 3600 seconds, and the WLAN-wide client limit is controlled with Maximum Allowed Clients.
  source: 2-Network-Access_103/NA-046.png

- id: NA-047
  topic: Network Access
  subtopic: STP
  type: single_choice
  difficulty: easy
  tags:
