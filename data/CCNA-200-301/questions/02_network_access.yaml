- id: NA-048
  topic: Network Access
  subtopic: Switching
  type: single_choice
  difficulty: easy
  tags:
  - arp
  - broadcast
  - flooding
  - switching
  question: Refer to the exhibit. PC1 tries to ping PC3 for the first time and sends out an ARP to S1. Which action is taken by S1?
  exhibit: 'Switching behavior:

    - PC1 sends an ARP request for the first time

    - ARP request is a broadcast frame


    Task:

    - determine how S1 forwards the ARP broadcast inside the VLAN

    '
  options:
    A: It is flooded out every port except G0/0.
    B: It drops the frame.
    C: It forwards it out G0/3 only.
    D: It forwards it out interface G0/2 only.
  correct_answer: A
  explanation: An ARP request is a broadcast frame, so the switch floods it out all other forwarding ports in the VLAN except the ingress port.
  source: 2-Network-Access_103/NA-048.png

