- id: NA-043
  topic: Network Access
  subtopic: Switching
  type: single_choice
  difficulty: easy
  tags:
  - switching
  - flooding
  - mac-address-table
  question: A switch is forwarding a frame out of all interfaces except the interface that received the frame. What is the technical term for this process?
  options:
    A: ARP
    B: CDP
    C: flooding
    D: multicast
  correct_answer: C
  explanation: When a switch must send a frame out all other ports in the VLAN because the destination is unknown or broadcast, that behavior is called flooding.
  source: adapted_from_images

